<div class="tab-pane" id="loginflow" role="tabpanel" aria-labelledby="loginflow-tab" style="min-height: 500px;">

<script>
    let currentLoginFlowDetails = "";

    function displayUpdateFunctionForLoginCallbackURI() {
        document.getElementById('modifyButtonsForCallbackURI').style.display = 'block';
    }

    // === Embedded Authentication Helpers ===

    function isEmbeddedAuthentication() {
        const checkbox = document.getElementById('useEmbeddedAuthentication');
        return checkbox && checkbox.checked;
    }

    function validateUriForMode(uri, embedded) {
        if (!uri || uri.trim() === '') return true; // empty is ok
        uri = uri.trim();
        if (uri.startsWith('https://')) return true; // always valid
        if (uri.startsWith('HTTPS://')) return true; // always valid
        if (embedded && uri.startsWith('/')) return true; // embedded allows paths
        return false;
    }

    function showFieldWarning(fieldId, message) {
        let warningEl = document.getElementById(fieldId + '_warning');
        if (!warningEl) {
            warningEl = document.createElement('div');
            warningEl.id = fieldId + '_warning';
            warningEl.className = 'text-danger mt-1 small';
            warningEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
            // Insert after the field
            const field = document.getElementById(fieldId);
            if (field && field.parentNode) {
                field.parentNode.insertBefore(warningEl, field.nextSibling);
            }
        } else {
            warningEl.style.display = 'block';
        }
    }

    function hideFieldWarning(fieldId) {
        const warningEl = document.getElementById(fieldId + '_warning');
        if (warningEl) {
            warningEl.style.display = 'none';
        }
    }

    function showRowWarning(rowContainerId, message) {
        let warningEl = document.getElementById(rowContainerId + '_warning');
        if (!warningEl) {
            warningEl = document.createElement('span');
            warningEl.id = rowContainerId + '_warning';
            warningEl.className = 'text-danger ms-2';
            warningEl.title = message;
            warningEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            // Append to the row container (the <th> element that shows the text)
            const container = document.getElementById(rowContainerId);
            if (container) {
                container.appendChild(warningEl);
            }
        } else {
            warningEl.style.display = 'inline';
            warningEl.title = message;
        }
    }

    function hideRowWarning(rowContainerId) {
        const warningEl = document.getElementById(rowContainerId + '_warning');
        if (warningEl) {
            warningEl.style.display = 'none';
        }
    }

    function validateLoginFlowForEmbeddedMode() {
        const embedded = isEmbeddedAuthentication();
        let hasWarnings = false;

        // Validate loginCallbackURI
        const callbackUri = document.getElementById('callbackURI').value.trim();
        if (!validateUriForMode(callbackUri, embedded)) {
            showFieldWarning('callbackURI', embedded
                ? 'Embedded auth requires https:// URL or / path'
                : 'Non-embedded auth requires https:// URL');
            hasWarnings = true;
        } else {
            hideFieldWarning('callbackURI');
        }

        // Validate WebLoginRedirectURIs
        document.querySelectorAll('[id^="ulist-webLoginRedirectURIsById-"]').forEach((input, idx) => {
            const rowId = 'ulist-webLoginRedirectURIs-' + idx;
            if (!validateUriForMode(input.value.trim(), embedded)) {
                showRowWarning(rowId, embedded
                    ? 'Embedded auth requires https:// URL or / path'
                    : 'Non-embedded auth requires https:// URL');
                hasWarnings = true;
            } else {
                hideRowWarning(rowId);
            }
        });

        // Validate WebLoginOrigins (always require https://)
        document.querySelectorAll('[id^="ulist-webLoginOriginsById-"]').forEach((input, idx) => {
            const rowId = 'ulist-webLoginOrigins-' + idx;
            const uri = input.value.trim();
            if (uri && !uri.toLowerCase().startsWith('https://')) {
                showRowWarning(rowId, 'Origin must start with https://');
                hasWarnings = true;
            } else {
                hideRowWarning(rowId);
            }
        });

        // Update warning icon next to app name in modal header
        const headerWarning = document.getElementById('applicationNameWarning');
        if (headerWarning) {
            if (hasWarnings) {
                headerWarning.style.display = 'inline';
                headerWarning.title = 'Some Login Flow fields are inconsistent with the current Embedded Authentication mode';
            } else {
                headerWarning.style.display = 'none';
                headerWarning.title = '';
            }
        }

        return hasWarnings;
    }

        function populateWebLoginOrigins(origins) {
            document.getElementById("tbody-webloginOrigins").innerHTML = "";
            if (origins != null) {
                let internalId = 0;

                for (let account of origins) {

                    $("#tbody-webloginOrigins").append(
                        `<tr> 
                        <th scope="row" id=ulist-webLoginOrigins-${internalId}></th>
                        <td style="text-align: right;">
                            <input type=hidden id="ulist-webLoginOriginsById-${internalId}">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="javascript:removeWebLoginOriginFromApp(${internalId})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`
                    );
                    document.getElementById(`ulist-webLoginOriginsById-${internalId}`).value = account;
                    $(`#ulist-webLoginOrigins-${internalId}`).text(account);
                    internalId++;
                }
            }
        }

        function updateWebLoginDefaultRedirectURIForApplication() {
            const selectedRadio = document.querySelector('input[name="defaultRedirectURI"]:checked');
            if (selectedRadio) {
                const redirectURI = selectedRadio.value;
                $.ajax({
                    url: '/api/v1/updateWebLoginDefaultRedirectURIForApplication',
                    type: 'PATCH',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        appName: currentApplication,
                        redirectURI: redirectURI
                    }),
                    success: function (response, textStatus, xhr) {
                        showTextToastSuccess("Default Redirect URI successfully updated.");
                    },
                    error: function (xhr, status, error) {
                        populateApplication();
                        commonFunctionError(xhr, status, error);
                    }
                });
            }
            else {
                showTextToastError("Please select a redirect URI.");
            }
        }

        function populateWebLoginRedirectURIs(redirectURIs, defaultRedirectURI) 
        {
            document.getElementById("tbody-webloginRedirectURIs").innerHTML = "";
            if (redirectURIs != null) 
            {
                let internalId = 0;
                for (let redirectURI of redirectURIs) 
                {
                    $("#tbody-webloginRedirectURIs").append(
                        `<tr> 
                        <th scope="row" id=ulist-webLoginRedirectURIs-${internalId}></th>
                        <td><input type="radio" name="defaultRedirectURI" id="defaultRedirectURI-${internalId}" onclick="updateWebLoginDefaultRedirectURIForApplication();"></td>
                        <td style="text-align: right;">
                            <input type=hidden id="ulist-webLoginRedirectURIsById-${internalId}">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="javascript:removeWebLoginRedirectURIFromApp(${internalId})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`
                    );
                    document.getElementById(`ulist-webLoginRedirectURIsById-${internalId}`).value = redirectURI;
                    $(`#ulist-webLoginRedirectURIs-${internalId}`).text(redirectURI);
                    document.getElementById(`defaultRedirectURI-${internalId}`).value = redirectURI;
                    if (redirectURI === defaultRedirectURI) {
                        document.getElementById(`defaultRedirectURI-${internalId}`).setAttribute('checked', 'checked');
                    }
                    internalId++;
                }
            }
        }

        function addWebLoginRedirectURItoApp() {
            var newRedirectURI = document.getElementById("newWebLoginRedirectURI").value;

            // Validate if redirect URI is not empty
            if (newRedirectURI.trim() === "") {
                showTextToastError("Redirect URI cannot be empty.");
                return;
            }

            // Check if embedded auth mode (allows paths)
            const embedded = isEmbeddedAuthentication();

            // Validate format based on embedded mode
            if (embedded) {
                // Embedded: accept https:// URLs or / paths
                if (!newRedirectURI.startsWith('https://') && !newRedirectURI.startsWith('/')) {
                    showTextToastError("Redirect URI must start with 'https://' or '/' (internal path) for embedded auth.");
                    return;
                }
            } else {
                // Non-embedded: require valid https:// URL
                try {
                    newURL = new URL(newRedirectURI);
                } catch (e) {
                    showTextToastError("Invalid URL format for redirect URI.");
                    return;
                }

                if (!newRedirectURI.toLowerCase().startsWith("https://")) {
                    showTextToastError("Redirect URI must start with 'https://' for security reasons.");
                    return;
                }
            }

            // Add redirect URI via PUT
            $.ajax({
                url: '/api/v1/addApplicationLoginRedirectURI',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({
                    appName: currentApplication,
                    redirectURI: newRedirectURI
                }),
                success: function (response, textStatus, xhr) {
                    showTextToastSuccess("Application redirect URI added successfully.");
                    document.getElementById("newWebLoginRedirectURI").value = "";
                    populateApplicationLoginFlow(response);
                },
                error: commonFunctionError
            });
        }

        function addWebLoginOriginToApp() {
            var newOrigin = document.getElementById("newWebLoginOrigin").value;

            newOrigin = newOrigin.trim();

            // Validate if origin is not empty
            if (newOrigin.trim() === "") {
                showTextToastError("Origin cannot be empty.");
                return;
            }

            // Validate if origin is a valid URL
            try {
                newURL = new URL(newOrigin);
            } catch (e) {
                showTextToastError("Invalid URL format for origin.");
                return;
            }

            // Validate if origin has no path
            if (newURL.pathname !== "/" || newURL.search !== "" || newURL.hash !== "") {
                showTextToastError("Origin must not contain a path, query string, or fragment.");
                return;
            }

            // Validate that the last byte of newOrigin is not "/"
            if (newOrigin.endsWith("/")) {
                showTextToastError("Origin must not end with '/'.");
                return;
            }





            // Validate if origin starts with https
            if (!newOrigin.toLowerCase().startsWith("https://")) {
                showTextToastError("Origin must start with 'https://' for security reasons.");
                return;
            }

            // Update description via PATCH
            $.ajax({
                url: '/api/v1/addApplicationLoginOrigin',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({
                    appName: currentApplication,
                    loginOrigin: newOrigin
                }),
                success: function (response, textStatus, xhr) {
                    showTextToastSuccess("Application origin added successfully.");
                    document.getElementById("newWebLoginOrigin").value = "";
                    populateApplicationLoginFlow(response);
                },
                error: commonFunctionError
            });
        }

        function removeWebLoginOriginFromApp(internalId) {
            var originToRemove = document.getElementById(`ulist-webLoginOriginsById-${internalId}`).value;

            // Update description via PATCH
            $.ajax({
                url: '/api/v1/removeApplicationLoginOrigin',
                type: 'DELETE',
                contentType: 'application/json',
                data: JSON.stringify({
                    appName: currentApplication,
                    loginOrigin: originToRemove
                }),
                success: function (response, textStatus, xhr) {
                    showTextToastSuccess("Application origin removed successfully.");
                    populateApplicationLoginFlow(response);
                },
                error: commonFunctionError
            });
        }

        function removeWebLoginRedirectURIFromApp(internalId) {
            var redirectURIToRemove = document.getElementById(`ulist-webLoginRedirectURIsById-${internalId}`).value;

            // Update description via PATCH
            $.ajax({
                url: '/api/v1/removeApplicationLoginRedirectURI',
                type: 'DELETE',
                contentType: 'application/json',
                data: JSON.stringify({
                    appName: currentApplication,
                    redirectURI: redirectURIToRemove
                }),
                success: function (response, textStatus, xhr) {
                    showTextToastSuccess("Application redirect URI removed successfully.");
                    populateApplicationLoginFlow(response);
                },
                error: commonFunctionError
            });
        }

        function populateApplicationLoginFlow(details) {
            currentLoginFlowDetails = details;
            document.getElementById("callbackURI").value = details["callbackURI"];
            populateWebLoginOrigins(details["loginOrigins"]);
            populateWebLoginRedirectURIs(details["redirectURIs"], details["defaultRedirectURI"]);

            // Validate data against current embedded mode after populating
            validateLoginFlowForEmbeddedMode();
        }

        function discardLoginCallbackURIDetails() {
            document.getElementById('modifyButtonsForCallbackURI').style.display = 'none';
            populateApplicationLoginFlow(currentLoginFlowDetails);
        }

        function modifyLoginCallbackURIDetails() {
            var callbackURI = document.getElementById("callbackURI").value;

            // Check if embedded auth mode (allows paths)
            const embedded = isEmbeddedAuthentication();

            // Validate format based on embedded mode
            if (embedded) {
                // Embedded: accept https:// URLs or / paths
                if (!callbackURI.startsWith('https://') && !callbackURI.startsWith('/')) {
                    showTextToastError("Callback URI must start with 'https://' or '/' (internal path) for embedded auth.");
                    return;
                }
            } else {
                // Non-embedded: require valid https:// URL
                try {
                    new URL(callbackURI);
                } catch (e) {
                    showTextToastError("Invalid URL format for callback URI.");
                    return;
                }

                if (!callbackURI.toLowerCase().startsWith("https://")) {
                    showTextToastError("Callback URI must start with 'https://' for security reasons.");
                    return;
                }
            }


            // Update description via PATCH
            $.ajax({
                url: '/api/v1/updateApplicationLoginCallbackURI',
                type: 'PATCH',
                contentType: 'application/json',
                data: JSON.stringify({
                    appName: currentApplication,
                    callbackURI: callbackURI
                }),
                success: function (response, textStatus, xhr) {
                    showTextToastSuccess("Application callback URI updated successfully.");
                    discardLoginCallbackURIDetails();
                    populateApplicationLoginFlow(response);
                },
                error: commonFunctionError
            });
        }
    </script>

    <div class="card mb-3">
        <div class="card-header" style="text-align: center;"><b>Login Callback URI (IAM->APP JWT Injection)</b></div>
        <div class="card-body">
            <input type="text" class="form-control" id="callbackURI" placeholder="Enter callback URI"
                oninput="displayUpdateFunctionForLoginCallbackURI()"
                onchange="displayUpdateFunctionForLoginCallbackURI()">
        </div>

        <table width=100% style=" border-spacing: 10px;   border-collapse: separate;">
            <tr>
                <td colspan="2" align="right" id="modifyButtonsForCallbackURI" style="display:none;">
                    <button type="button" class="btn btn-dark"
                        onclick="javascript:discardLoginCallbackURIDetails()">Discard
                        Changes</button>
                    <button type="button" class="btn btn-primary oldwarn"
                        onclick="javascript:modifyLoginCallbackURIDetails()">Update
                        Login CallBack URI</button>
                </td>
            </tr>
        </table>

    </div>

    <div class="card mb-3" id="appOriginsCard">
        <div class="card-header" style="text-align: center;"><b>Application Origins (APP->IAM Traffic, eg. logout, retokenization)</b></div>
        <div class="card-body">

            <div class="input-group mb-3">
                <input type="text" class="form-control" id="newWebLoginOrigin" placeholder="Enter new origin">
                &nbsp;&nbsp;
                <div class="input-group-append">
                    <button class="btn btn-outline-success" type="button" onclick="addWebLoginOriginToApp()"><i
                            class="fas fa-plus"></i> Add Origin</button>
                </div>
            </div>

            <table class="table table-hover">
                <thead class="thead-light">
                    <tr bgcolor=grey>
                        <th scope="col">Origin</th>
                        <th scope="col" style="text-align: right;"></th>
                    </tr>
                </thead>
                <tbody id="tbody-webloginOrigins">
                </tbody>
            </table>

        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header" style="text-align: center;"><b>WebLogin Redirect URIs (Post-Login Outgoing Redirections - Default if not specified)</b>
        </div>
        <div class="card-body">

            <div class="input-group mb-3">
                <input type="text" class="form-control" id="newWebLoginRedirectURI"
                    placeholder="Enter new redirect URI">
                &nbsp;&nbsp;
                <div class="input-group-append">
                    <button class="btn btn-outline-success" type="button" onclick="addWebLoginRedirectURItoApp()"><i
                            class="fas fa-plus"></i> Add Redirect URI</button>
                </div>
            </div>

            <table class="table table-hover">
                <thead class="thead-light">
                    <tr bgcolor=grey>
                        <th scope="col">Redirect URI</th>
                        <th scope="col">Default</th>
                        <th scope="col" style="text-align: right;"></th>
                    </tr>
                </thead>
                <tbody id="tbody-webloginRedirectURIs">
                </tbody>
            </table>

        </div>
    </div>

</div>
