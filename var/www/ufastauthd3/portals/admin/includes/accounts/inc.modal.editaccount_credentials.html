<div class="tab-pane" id="credentials" role="tabpanel" aria-labelledby="credentials-tab" style="min-height: 500px;">
    <table width=100% style=" border-spacing: 10px;   border-collapse: separate;">
        <!-- ============================================= -->
        <!-- SECTION: User Credential Slots Management     -->
        <!-- ============================================= -->
        <tr>
            <td align="center">
                <div class="card" style="max-width: 95%; text-align: left;">
                    <div class="card-header d-flex justify-content-between align-items-center" style="background-color: #fff3cd;">
                        <h5 class="mb-0">Authentication Slots</h5>
                        <button type="button" class="btn btn-warning btn-sm" id="generateMasterBtn"
                            onclick="javascript:generateNewMasterPassword()" style="display:none;">
                            <i class="fas fa-key"></i> Generate New Master Password
                        </button>
                    </div>
                    <div class="card-body">
                        <!-- Generated Password Inline Display Area (no nested modal) -->
                        <div id="generatedPasswordArea" style="display:none;" class="alert alert-info">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <strong>New Master Password Generated:</strong>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="javascript:hideGeneratedPassword()">
                                    <i class="fas fa-times"></i> Close
                                </button>
                            </div>
                            <div class="input-group">
                                <span id="generatedPasswordMasked" class="form-control-plaintext fw-bold fs-5 font-monospace"></span>
                                <input type="text" id="generatedPasswordPlain" class="form-control fw-bold fs-5 font-monospace" readonly style="display:none;">
                                <button class="btn btn-outline-primary" type="button" onclick="javascript:togglePasswordVisibility()">
                                    <i class="fas fa-eye" id="togglePasswordIcon"></i> <span id="togglePasswordText">Reveal</span>
                                </button>
                                <button class="btn btn-outline-success" type="button" onclick="javascript:copyGeneratedPassword()">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                            </div>
                        </div>
                        <p class="card-text">
                        <table class="table table-hover">
                            <thead class="thead-light">
                                <tr>
                                    <th scope="col">Slot</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Last Changed</th>
                                    <th scope="col">Expires</th>
                                    <th scope="col">Must Change</th>
                                    <th scope="col">Bad Attempts</th>
                                    <th scope="col" style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="credentialSlotsTable">
                            </tbody>
                        </table>
                        </p>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</div>
<script>
    // Global variables
    let lastGeneratedPassword = '';
    let slotDescriptionMap = {}; // Maps slotId -> slotDescription for use in action functions

    // =============================================
    // Data mapping helpers — adapt server response
    // to the flat properties the renderer expects
    // =============================================

    /**
     * Given a raw slot object from getAccountCredentialSlots, return a
     * "normalised" slot with the flat properties used by the rest of the
     * code (active, blocked, mustChange, lastChanged, expiresAt, …).
     */
    function normaliseSlot(rawSlot) {
        const slotData = rawSlot.slotData;
        const slotInfo = rawSlot.slotInfo || {};

        // A slot is "active" when slotData is present (not null)
        const active = slotData !== null && slotData !== undefined;

        return {
            slotId:          rawSlot.slotId,
            slotDescription: slotInfo.description || ('Slot #' + rawSlot.slotId),

            // --- status flags ---
            active:    active,
            blocked:   active ? (slotData.isLocked === true) : false,
            mustChange:active ? (slotData.mustChange === true) : false,

            // --- timestamps (seconds → milliseconds for JS Date) ---
            lastChanged:  active ? (slotData.lastChange          ? slotData.lastChange  * 1000 : null) : null,
            expiresAt:    active ? (slotData.expirationTimestamp ? slotData.expirationTimestamp * 1000 : null) : null,

            // --- convenience flags ---
            isExpired:            active ? (slotData.isExpired === true) : false,
            badAttempts:          active ? (slotData.badAttempts || 0)   : 0,
            hasExceededMaxAttempts: active ? (slotData.hasExceededMaxAttempts === true) : false,

            // keep references for debugging / advanced logic
            _raw: rawSlot,
            _slotData: slotData,
            _slotInfo: slotInfo
        };
    }

    // =============================================
    // AJAX: fetch credential slots
    // =============================================

    function populateAccountCredentialSlots() {
        document.getElementById('credentialSlotsTable').innerHTML = '';
        slotDescriptionMap = {};
        $.ajax({
            url: '/api/v1/getAccountCredentialSlots',
            type: 'GET',
            contentType: 'application/json',
            data: JSON.stringify({
                accountName: currentAccount
            }),
            success: function (response) {
                // The server returns { currentAuthPolicy, slots: [...] }
                // We need the array inside response.slots
                if (response && response.slots && Array.isArray(response.slots)) {
                    renderCredentialSlotsTable(response.slots);
                } else {
                    // Fallback: maybe the array was returned directly
                    if (Array.isArray(response)) {
                        renderCredentialSlotsTable(response);
                    } else {
                        showToastError('Unexpected response format from getAccountCredentialSlots.');
                    }
                }
            },
            error: commonFunctionError
        });
    }


    // =============================================
    // Render the credential-slots table rows
    // =============================================

    function renderCredentialSlotsTable(rawSlots) {
        const tableBody = document.getElementById('credentialSlotsTable');
        tableBody.innerHTML = '';

        // Normalise every raw slot and build the description map
        const slots = rawSlots.map(normaliseSlot);

        for (let slot of slots) {
            slotDescriptionMap[slot.slotId] = slot.slotDescription;
        }

        let hasMasterSlot = false;

        for (let slot of slots) {
            const slotId  = slot.slotId;
            const slotDesc = slot.slotDescription;
            const isMaster = (slotId === 1);

            if (isMaster && slot.active) {
                hasMasterSlot = true;
            }

            // ---- Build row structure with empty placeholders ----
            const row = `
                <tr id="credentialSlotRow-${slotId}">
                    <th scope="row">
                        <strong id="slot-desc-${slotId}"></strong>
                        <br><small class="text-muted" id="slot-num-${slotId}"></small>
                    </th>
                    <td id="slot-status-${slotId}"></td>
                    <td id="slot-lastchanged-${slotId}"></td>
                    <td id="slot-expires-${slotId}"></td>
                    <td id="slot-mustchange-${slotId}"></td>
                    <td id="slot-badattempts-${slotId}"></td>
                    <td style="text-align: right;" id="slot-actions-${slotId}"></td>
                </tr>
            `;
            tableBody.innerHTML += row;

            // ---- Populate text fields safely using .text() (prevents XSS) ----
            $(`#slot-desc-${slotId}`).text(slotDesc);
            $(`#slot-num-${slotId}`).text('(Slot #' + slotId + ')');

            // ---- Status badge (internally generated HTML, not user data) ----
            // A credential is considered "blocked" if it is explicitly locked OR
            // if the user has exceeded the maximum number of bad attempts.
            let statusBadge = '';
            if (!slot.active) {
                statusBadge = '<span class="badge bg-secondary">Inactive</span>';
            } else if (slot.blocked || slot.hasExceededMaxAttempts) {
                statusBadge = '<span class="badge bg-danger">Blocked</span>';
            } else if (slot.isExpired) {
                statusBadge = '<span class="badge bg-warning text-dark">Expired</span>';
            } else {
                statusBadge = '<span class="badge bg-success">Active</span>';
            }
            $(`#slot-status-${slotId}`).html(statusBadge);

            // ---- Dates ----
            $(`#slot-lastchanged-${slotId}`).html(formatDateHTML(slot.lastChanged));
            $(`#slot-expires-${slotId}`).html(formatDateHTML(slot.expiresAt));

            // ---- Must-change badge ----
            let mustChangeBadge = '';
            if (slot.mustChange) {
                mustChangeBadge = '<span class="badge bg-warning text-dark">Change Required</span>';
            } else {
                mustChangeBadge = '<span class="text-muted">-</span>';
            }
            $(`#slot-mustchange-${slotId}`).html(mustChangeBadge);

            // ---- Bad Attempts display ----
            // Only show in red when badAttempts reaches maxTries.
            // Show in warning (yellow) when there are attempts but under the limit.
            let badAttemptsHtml = '';
            if (slot.active) {
                if (slot.badAttempts >= slot.maxTries) {
                    badAttemptsHtml = '<span class="badge bg-danger">' + slot.badAttempts + '</span>';
                } else if (slot.badAttempts > 0) {
                    badAttemptsHtml = '<span class="badge bg-warning">' + slot.badAttempts + '</span>';
                } else {
                    badAttemptsHtml = '<span class="text-muted">0</span>';
                }
            } else {
                badAttemptsHtml = '<span class="text-muted">-</span>';
            }
            $(`#slot-badattempts-${slotId}`).html(badAttemptsHtml);

            // ---- Action buttons (internally generated HTML, not user data) ----
            // Buttons are stacked vertically (me-0 mb-1) with text labels
            let actionButtons = '';

            // Delete (not for master, only for active slots)
            if (!isMaster && slot.active) {
                actionButtons += `<button type="button" class="btn btn-danger btn-sm me-0 mb-1"
                    title="Delete Credential"
                    onclick="javascript:removeCredentialSlot(${slotId})"
                    style="width: 100%;">
                    <i class="fas fa-trash"></i> Delete
                </button>`;
            }

            // Block / Unblock
            // Show "Unblock" button when the credential is explicitly locked OR
            // when the user has exceeded max bad attempts (auto-blocked by policy).
            // The unblock API call will reset the badAttempts counter as well.
            if (slot.active && !slot.blocked && !slot.hasExceededMaxAttempts) {
                actionButtons += `<button type="button" class="btn btn-warning btn-sm me-0 mb-1"
                    title="Block Credential"
                    onclick="javascript:blockCredentialSlot(${slotId})"
                    style="width: 100%;">
                    <i class="fas fa-lock"></i> Block
                </button>`;
            } else if (slot.active && (slot.blocked || slot.hasExceededMaxAttempts)) {
                actionButtons += `<button type="button" class="btn btn-success btn-sm me-0 mb-1"
                    title="Unblock Credential (resets bad attempts)"
                    onclick="javascript:unblockCredentialSlot(${slotId})"
                    style="width: 100%;">
                    <i class="fas fa-lock-open"></i> Unblock
                </button>`;
            }

            // Force / Cancel password change (only for active slots)
            if (slot.active) {
                if (slot.mustChange) {
                    actionButtons += `<button type="button" class="btn btn-outline-warning btn-sm me-0 mb-1"
                        title="Cancel Forced Reset"
                        onclick="javascript:cancelMustChangeCredential(${slotId})"
                        style="width: 100%;">
                        <i class="fas fa-undo"></i> Cancel Forced Reset
                    </button>`;
                } else {
                    actionButtons += `<button type="button" class="btn btn-outline-warning btn-sm me-0 mb-1"
                        title="Force Password Change"
                        onclick="javascript:mustChangeCredential(${slotId})"
                        style="width: 100%;">
                        <i class="fas fa-exclamation-triangle"></i> Require Change
                    </button>`;
                }
            }

            $(`#slot-actions-${slotId}`).html(actionButtons);
        }

        // Show / hide the "Generate New Master Password" button
        document.getElementById('generateMasterBtn').style.display = hasMasterSlot
            ? 'inline-block' : 'none';
    }


    // ================================================
    // Credential Slot Action Functions
    // ================================================

    function removeCredentialSlot(slotId) {
        showYesNoDialog(
            `Are you sure you want to delete the credential? This action cannot be undone.`,
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/removeAccountCredentialSlot',
                        type: 'DELETE',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount,
                            slotId: slotId
                        }),
                        success: function () {
                            showToastSuccess('Credential deleted successfully.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }

    function blockCredentialSlot(slotId) {
        showYesNoDialog(
            `Are you sure you want to <b>block</b> the credential?`,
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/setCredentialLockedStatus',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount,
                            lockedStatus: true,
                            slotId: slotId
                        }),
                        success: function () {
                            showToastSuccess('Credential blocked successfully.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }

    function unblockCredentialSlot(slotId) {
        showYesNoDialog(
            `Are you sure you want to <b>unblock</b> the credential?`,
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/setCredentialLockedStatus',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount,
                            lockedStatus: false,
                            slotId: slotId
                        }),
                        success: function () {
                            showToastSuccess('Credential unblocked successfully.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }

    function mustChangeCredential(slotId) {
        showYesNoDialog(
            `Force a password change on next login?`,
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/setMustChangeCredential',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount,
                            slotId: slotId,
                            mustChange: true
                        }),
                        success: function () {
                            showToastSuccess('Password set to be changed in the next login.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }

    function cancelMustChangeCredential(slotId) {
        showYesNoDialog(
            `Cancel the forced password change on the next login?`,
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/setMustChangeCredential',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount,
                            slotId: slotId,
                            mustChange: false
                        }),
                        success: function () {
                            showToastSuccess('Forced password change cancelled.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }


    // ================================================
    // Master Password Generation Functions
    // ================================================

    function generateNewMasterPassword() {
        showYesNoDialog(
            'Generate a new master password for this user? The current master password will be replaced.',
            function (result) {
                if (result) {
                    $.ajax({
                        url: '/api/v1/generateMasterPassword',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            accountName: currentAccount
                        }),
                        success: function (response) {
                            lastGeneratedPassword = response.password || response["password"] || '';
                            showGeneratedPasswordInline(lastGeneratedPassword);
                            showToastSuccess('New master password generated successfully.');
                            populateAccountCredentialSlots();
                        },
                        error: commonFunctionError
                    });
                }
            }
        );
    }

    function showGeneratedPasswordInline(password) {
        const area   = document.getElementById('generatedPasswordArea');
        const masked = document.getElementById('generatedPasswordMasked');
        const plain  = document.getElementById('generatedPasswordPlain');
        const icon   = document.getElementById('togglePasswordIcon');
        const text   = document.getElementById('togglePasswordText');

        masked.textContent = '*'.repeat(password.length);
        plain.value        = password;

        // Default to hidden
        masked.style.display = '';
        plain.style.display  = 'none';
        icon.className       = 'fas fa-eye';
        text.textContent     = 'Reveal';

        area.style.display = 'block';
    }

    function hideGeneratedPassword() {
        document.getElementById('generatedPasswordArea').style.display = 'none';
        lastGeneratedPassword = '';
    }

    function togglePasswordVisibility() {
        const masked = document.getElementById('generatedPasswordMasked');
        const plain  = document.getElementById('generatedPasswordPlain');
        const icon   = document.getElementById('togglePasswordIcon');
        const text   = document.getElementById('togglePasswordText');

        if (plain.style.display === 'none') {
            plain.style.display = '';
            masked.style.display = 'none';
            icon.className       = 'fas fa-eye-slash';
            text.textContent     = 'Hide';
        } else {
            plain.style.display = 'none';
            masked.style.display = '';
            icon.className       = 'fas fa-eye';
            text.textContent     = 'Reveal';
        }
    }

    function copyGeneratedPassword() {
        navigator.clipboard.writeText(lastGeneratedPassword).then(function () {
            showToastSuccess('Password copied to clipboard.');
        }).catch(function () {
            const tempInput = document.createElement('input');
            tempInput.value = lastGeneratedPassword;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToastSuccess('Password copied to clipboard.');
        });
    }


    // ================================================
    // Main population function (called by parent)
    // ================================================

    function populateAccountCredentials() {
        document.getElementById('generatedPasswordArea').style.display = 'none';
        lastGeneratedPassword = '';
        slotDescriptionMap    = {};
        populateAccountCredentialSlots();
    }
</script>
