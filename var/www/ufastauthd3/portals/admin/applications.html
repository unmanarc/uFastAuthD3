<script>
  document.getElementById("apptitle").innerHTML = "Applications &#9658; Applications Directory";
  document.getElementById("mainview-application-directory-link").style.color = "white";
</script>

<div class="container-fluid" style="width: 95%;">
  <div class="d-flex justify-content-end mb-3">
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCreateApplication"
      onclick="createApplicationClearParameters()">
      Add Application
    </button>
  </div>
  <hr>

  <table id="applicationsTable" class="display">
    <thead>
      <tr>
        <th scope="col">Application Name</th>
        <th scope="col">Description</th>
        <th scope="col">Creator</th>
        <th scope="col" style="text-align: right;">Controls&nbsp;</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>
</div>

<script>
  function generateRandomKey(id) {
    var proposedKey = genNewKey();

    document.getElementById(id).value = proposedKey;
  }

  new DataTable('#applicationsTable', {
    ajax: {
      "url": "/api/v1/searchApplications",
      "type": 'GET',
      "data": function (d) {
        return JSON.stringify(d);
      }
    },
    processing: true,
    serverSide: true,
    columns: [
      {
        data: "appName",
        title: "Application Name",
        render: function (data, type, row) {
          var span = document.createElement('span');
          var icon = document.createElement('i');
          icon.className = 'fas fa-window-maximize';
          span.appendChild(icon);
          span.appendChild(document.createTextNode(' ' + (data || '')));
          return span.outerHTML;
        }
      },
      {
        data: "appDescription",
        title: "Description",
        searchable: false
      },
      {
        data: null,
        title: "Created by",
        searchable: false,
        render: function (data, type, row) {
          var a = document.createElement('a');
          var displayName = row.DT_RowData.appCreatorDisplayName || 'SYSTEM';
          var b64Uuid = window.btoa(row.DT_RowData.appCreatorAccountUUID);
          a.href = '/accounts?edit=' + b64Uuid;
          a.appendChild(document.createTextNode(displayName));
          return a.outerHTML;
        }
      },
      {
        data: null,
        orderable: false,
        searchable: false,
        render: function (data, type, row) {
          let b64AppName = window.btoa(row.appName);
          return `<div class="d-flex flex-wrap gap-1 justify-content-end">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditApplication" onclick="loadAndEditApplication('${b64AppName}')">
                          <i class="fas fa-edit"></i>
                        </button>
                      </div>`;
        }
      }
    ]
  });
</script>
