<script>
  document.getElementById("apptitle").innerHTML = "Applications &#9658; Applications Directory";
  document.getElementById("mainview-application-directory-link").style.color = "white";
</script>

<div class="container-fluid" style="width: 95%;">
  <div class="d-flex justify-content-end mb-3">
    <button type="button" class="btn bfsuccess btn-primary" data-bs-toggle="modal" data-bs-target="#modalCreateApplication"
      onclick="createApplicationClearParameters()">
      Create New Application
    </button>
  </div>
  <hr>

  <table id="applicationsTable" class="table table-striped table-hover">
    <thead>
      <tr>
        <th scope="col">Application Name</th>
        <th scope="col">Description</th>
        <th scope="col" style="text-align: right;">Creator</th>
        <th scope="col" style="text-align: right;">Controls&nbsp;</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>
</div>

<script>
  function generateRandomKey(id) {
    var proposedKey = genNewKey();

    document.getElementById(id).value = proposedKey;
  }

  new DataTable('#applicationsTable', {
    ajax: {
      "url": "/api/v1/searchApplications",
      "type": 'GET',
      "data": function (d) {
        return JSON.stringify(d);
      }
    },
    processing: true,
    serverSide: true,
    columns: [
      {
        data: "appName",
        title: "Application Name",
        render: function (data, type, row) {
          var container = document.createElement('span');
          var icon = document.createElement('i');
          icon.className = 'fas fa-window-maximize';
          container.appendChild(icon);
          container.appendChild(document.createTextNode(' '));
          var nameSpan = document.createElement('span');
          nameSpan.className = 'text-primary';
          nameSpan.style.fontWeight = 'bold';
          nameSpan.appendChild(document.createTextNode(data || ''));
          container.appendChild(nameSpan);
          return container.outerHTML;
        }
      },
      {
        data: "appDescription",
        title: "Description",
        searchable: false
      },
      {
        data: "registeredAccounts",
        title: "Registered Accounts",
        searchable: false
      },
      {
        data: null,
        title: "Created by",
        searchable: false,
        className: "text-end",
        render: function (data, type, row) {
          var displayName = row.DT_RowData.appCreatorDisplayName || 'SYSTEM';
          if (displayName === 'SYSTEM') {
            return '<strong>SYSTEM</strong>';
          }
          var b64Uuid = window.btoa(row.DT_RowData.appCreatorAccountUUID);
          return '<a href="/accounts?edit=' + b64Uuid + '">' + displayName + '</a>';
        }
      },
      {
        data: null,
        orderable: false,
        searchable: false,
        render: function (data, type, row) {
          let b64AppName = window.btoa(row.appName);
          return `<div class="d-flex flex-wrap gap-1 justify-content-end">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditApplication" onclick="loadAndEditApplication('${b64AppName}')">
                          <i class="fas fa-edit"></i>
                        </button>
                      </div>`;
        }
      }
    ]
  });
</script>

<script>
    // Check for 'edit' URL parameter on page load and open edit modal immediately
  
    const urlParams = new URLSearchParams(window.location.search);
    const editUUID = urlParams.get('edit');
    if (editUUID) 
    {
      // Open modal immediately, load account data in background
      const modalElement = document.getElementById('modalEditApplication');
      if (modalElement) 
      {
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
        // Load account data in background and populate the modal when ready
        loadAndEditApplication(editUUID);
      }
    }
</script>
