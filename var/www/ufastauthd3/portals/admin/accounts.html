<div class="container-fluid" style="width: 95%;">
  <div class="d-flex justify-content-end mb-3">


    <button type="button" class="btn bfsuccess btn-primary" data-bs-toggle="modal" data-bs-target="#modalCreateAccount">
      Create New Account
    </button>

  </div>
  <hr>
  <table id="accountsTable" class="table table-striped table-hover">
    <thead>
      <tr>
        <th scope="col">Account Name</th>
        <th scope="col">Creation</th>
        <th scope="col">Expiration</th>
        <th scope="col">Last Access</th>
        <th scope="col">Last Password Change</th>
        <th scope="col">Applications</th>
        <th scope="col">Status</th>
        <th scope="col" style="text-align: right;">Controls&nbsp;</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
</div>

<script>
  new DataTable('#accountsTable', {
    ajax: {
      "url": "/api/v1/searchAccounts",
      "type": 'GET',
      "data": function (d) {
        return JSON.stringify(d);
      }
    },
    processing: true,
    serverSide: true,
    columns: [
      {
        data: null,
        title: "Display Name",
        render: function (data, type, row) {
          var container = document.createElement('span');
          var icon = document.createElement('i');
          icon.className = 'fa-regular fa-circle-user';
          container.appendChild(icon);
          container.appendChild(document.createTextNode(' '));
          var nameSpan = document.createElement('span');
          nameSpan.className = 'text-primary';
          nameSpan.style.fontWeight = 'bold';
          nameSpan.appendChild(document.createTextNode(row.displayName || ''));
          container.appendChild(nameSpan);
          return container.outerHTML;
        }
      },
      {
        data: "creation",
        title: "Creation",
        searchable: false,
        render: function (data, type, row) {
          if (data === null || data === 0) return 'Never';
          var date = new Date(data * 1000);
          return date.toLocaleString();
        }
      },
      {
        data: "expiration",
        title: "Expiration",
        searchable: false,
        render: function (data, type, row) {
          if (data === null || data === 0) return 'Never';
          var date = new Date(data * 1000);
          return date.toLocaleString();
        }
      },
      {
        data: "lastLogin",
        title: "Last Access",
        searchable: false,
        render: function (data, type, row) {
          if (data === null || data === 0) return 'Never';
          var date = new Date(data * 1000);
          return date.toLocaleString();
        }
      },
      {
        data: "lastPasswordChange",
        title: "Last Password Change",
        searchable: false,
        render: function (data, type, row) {
          if (data === null || data === 0) return 'Never';
          var date = new Date(data * 1000);
          var today = new Date();
          var diffTime = Math.abs(today - date);
          var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          return diffDays + " days ago";
        }
      },
      {
        data: "applications",
        orderable: false,
        searchable: false,
        title: "Applications",
        render: function (data, type, row) {
          if (!data || data.length === 0) {
            const noneBadge = document.createElement('span');
            noneBadge.className = 'badge bg-secondary';
            const noneIcon = document.createElement('i');
            noneIcon.className = 'fas fa-ban';
            noneIcon.style.color = 'lightcoral';
            noneIcon.style.marginRight = '4px';
            noneBadge.appendChild(noneIcon);
            noneBadge.appendChild(document.createTextNode('None'));
            return noneBadge.outerHTML;
          }
          let badges = '';
          data.forEach(function (app) {
            // Encode app name to base64 for the link
            const appnameb64 = window.btoa(app.name);

            // Create anchor element
            const link = document.createElement('a');
            link.href = '/applications?edit=' + appnameb64;

            // Create badge element safely to prevent XSS
            const badge = document.createElement('span');
            badge.className = 'badge bg-secondary';

            // Add Font Awesome icon: star for admin, user for non-admin
            const icon = document.createElement('i');
            if (app.isAppAdmin) {
              icon.className = 'fas fa-star';
            } else {
              icon.className = 'fas fa-user';
            }
            icon.style.color = 'lightblue';
            icon.style.marginRight = '4px';
            badge.appendChild(icon);

            // Create text node for app name (automatically escapes content)
            const appName = document.createTextNode(app.name);
            badge.appendChild(appName);

            link.appendChild(badge);
            badges += link.outerHTML + ' ';
          });
          return badges;
        }
      },
      {
        data: null,
        orderable: false,
        searchable: false,
        render: function (data, type, row) {

          let statusHtml = '<div class="d-flex flex-wrap gap-1">';

          // Only show "Operational" if enabled, confirmed, not blocked, not inactive, and no blocked credentials
          const isOperational = row.DT_RowData.isEnabled === true
            && row.DT_RowData.isAccountConfirmed === true
            && row.DT_RowData.isBlocked === false
            && row.DT_RowData.hasBlockedCredential !== true
            && row.DT_RowData.isInactive !== true;

          if (isOperational) {
            statusHtml += '<span class="badge bg-primary">Operational</span>';
          } else {
            if (row.DT_RowData.isEnabled === false)
              statusHtml += '<span class="badge bg-warning">Disabled</span>';
            if (row.DT_RowData.isAccountConfirmed === false)
              statusHtml += '<span class="badge bg-black">Unconfirmed</span>';
            if (row.DT_RowData.isBlocked === true)
              statusHtml += '<span class="badge bg-warning">Blocked</span>';
            if (row.DT_RowData.isInactive === true)
              statusHtml += '<span class="badge bg-warning">Inactive</span>';
          }

          // Always show Administrator if applicable
          if (row.DT_RowData.isAdmin === true)
            statusHtml += '<span class="badge bg-danger">Administrator</span>';

          // Show Credential Blocked if any credential is blocked
          if (row.DT_RowData.hasBlockedCredential === true)
            statusHtml += '<span class="badge bg-warning">Credential Blocked</span>';

          statusHtml += '</div>';


          return statusHtml;
        }
      },
      {
        data: null,
        orderable: false,
        searchable: false,
        render: function (data, type, row) {
          let b64AccountUUID = window.btoa(row.accountUUID);
          let buttons = '<div style="text-align: right;">';

          // Dismiss Inactivity button (only show if inactive)
          if (row.DT_RowData.isInactive === true) {
            buttons += `<button type="button" class="btn btn-primary oldwarn btn-sm me-1" onclick="dismissInactivity('${b64AccountUUID}')" title="Dismiss Inactivity">
                        <i class="fas fa-check-double"></i>
                      </button>`;
          }

          // Edit button
          buttons += `<button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditAccount" onclick="loadAndEditAccount('${b64AccountUUID}')">
                      <i class="fas fa-edit"></i>
                      </button>`;

          buttons += '</div>';
          return buttons;
        }
      }
    ]
  });





  function dismissInactivity(b64AccountUUID) {
    var accountUUID = window.atob(b64AccountUUID);
    showYesNoHTMLDialog("Do you really want to dismiss inactivity for account '" + accountUUID + "'?", function (result) {
      if (result) {
        $.ajax({
          url: '/api/v1/extendAccountInactivity',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({
            accountUUID: accountUUID,
            validUntil: Math.floor(Date.now() / 1000) + (14 * 24 * 60 * 60)
          }),
          success: function (response) {
            showTextToastSuccess("Inactivity dismissed for account " + accountUUID + ".");
            var table = $('#accountsTable').DataTable();
            table.ajax.reload();
          },
          error: commonFunctionError
        });
      }
    });
  }
</script>

<script>
  // Check for 'edit' URL parameter on page load and open edit modal immediately

  const urlParams = new URLSearchParams(window.location.search);
  const editUUID = urlParams.get('edit');
  if (editUUID) {
    // Open modal immediately, load account data in background
    const modalElement = document.getElementById('modalEditAccount');
    if (modalElement) {
      const modal = new bootstrap.Modal(modalElement);
      modal.show();
      // Load account data in background and populate the modal when ready
      loadAndEditAccount(editUUID);
    }
  }
</script>
