<script>
  document.getElementById("apptitle").innerHTML = "Accounts &#9658; Accounts Fields";
  document.getElementById("mainview-account-fields-link").style.color = "white";
</script>

<div class="container-fluid" style="width: 95%;">
  <div class="d-flex justify-content-end mb-3">
    <button type="button" class="btn bfsuccess btn-primary" data-bs-toggle="modal" data-bs-target="#modalCreateAccountField"
      onclick="createAccountFieldClearParameters()">Create New Field</button>
  </div>
  <hr>
  <table id="fieldsTable" class="table table-striped table-hover">
     <thead>
       <tr>
         <th scope="col">Field Key Name</th>
         <th scope="col">Field Description</th>
         <th scope="col">Field Type</th>
         <th scope="col">Properties</th>
         <th scope="col">Order</th>
         <th scope="col" style="text-align: right;">Actions</th>
       </tr>
     </thead>
    <tbody>
    </tbody>
  </table>
</div>

<script>
  function moveFieldUp(fieldNameB64) {
    const fieldName = window.atob(fieldNameB64);
    $.ajax({
      url: '/api/v1/moveAccountDetailFieldUp',
      type: 'PATCH',
      contentType: 'application/json',
      data: JSON.stringify({
        fieldName: fieldName
      }),
      success: function (response, textStatus, xhr) {
        $("#fieldsTable").DataTable().ajax.reload();
      },
      error: function (xhr, status, error) {
        if (xhr.responseJSON && xhr.responseJSON.error && xhr.responseJSON.message) {
          showTextToastError("Error: " + xhr.responseJSON.error + " - " + xhr.responseJSON.message);
        } else {
          showTextToastError("Error " + xhr.status);
        }
      }
    });
  }

  function moveFieldDown(fieldNameB64) {
    const fieldName = window.atob(fieldNameB64);
    $.ajax({
      url: '/api/v1/moveAccountDetailFieldDown',
      type: 'PATCH',
      contentType: 'application/json',
      data: JSON.stringify({
        fieldName: fieldName
      }),
      success: function (response, textStatus, xhr) {
        $("#fieldsTable").DataTable().ajax.reload();
      },
      error: function (xhr, status, error) {
        if (xhr.responseJSON && xhr.responseJSON.error && xhr.responseJSON.message) {
          showTextToastError("Error: " + xhr.responseJSON.error + " - " + xhr.responseJSON.message);
        } else {
          showTextToastError("Error " + xhr.status);
        }
      }
    });
  }

  function deleteField(fieldNameB64) {
    if (!confirm("Are you sure you want to delete this field?")) {
      return;
    }
    const fieldName = window.atob(fieldNameB64);
    $.ajax({
      url: '/api/v1/removeAccountDetailField',
      type: 'DELETE',
      contentType: 'application/json',
      data: JSON.stringify({
        fieldName: fieldName
      }),
      success: function (response, textStatus, xhr) {
        // Refresh the DataTable after successful field creation
        $("#fieldsTable").DataTable().ajax.reload();
        showTextToastSuccess("Field successfully removed.");
      },
      error: function (xhr, status, error) {
        if (xhr.responseJSON && xhr.responseJSON.error && xhr.responseJSON.message) {
          showTextToastError("Error: " + xhr.responseJSON.error + " - " + xhr.responseJSON.message);
        } else {
          showTextToastError("Error " + xhr.status);
        }
      }
    });

  }


  new DataTable('#fieldsTable', {
    ajax: {
      "url": "/api/v1/searchFields",
      "type": 'GET',
      "dataSrc": function (json) {
        // Mark first and last items so the render function can disable buttons at edges
        var data = json.data;
        for (var i = 0; i < data.length; i++) {
          data[i]._isFirst = (i === 0);
          data[i]._isLast = (i === data.length - 1);
        }
        return data;
      }
    },
    processing: false,
    serverSide: false,
    paging: false,
    searching: false,
    order: [],
    columns: [
      {
        data: "fieldName",
        title: "Field Name",
        orderable: false,
        render: function (data, type, row) {
          var fieldType = row.fieldType || '';
          var iconClass = 'fa-circle-info';
          switch (fieldType) {
            case 'TEXTLINE':
              iconClass = 'fa-font';
              break;
            case 'TEXTAREA':
              iconClass = 'fa-align-left';
              break;
            case 'PASSWORD':
              iconClass = 'fa-key';
              break;
            case 'EMAIL':
              iconClass = 'fa-envelope';
              break;
            case 'NUMBER':
              iconClass = 'fa-hashtag';
              break;
            case 'CHECKBOX':
              iconClass = 'fa-square-check';
              break;
          }
          return '<i class="fa-solid ' + iconClass + '"></i> <span class="text-primary" style="font-weight: bold;">' + (data || '') + '</span>';
        }
      },
      {
        data: "fieldDescription",
        title: "Field Description",
        orderable: false
      },
      {
        data: "fieldType",
        title: "Field Type",
        orderable: false
      },
       {
         data: null,
         title: "Properties",
         orderable: false,
         render: function (data, type, row) {
           let badges = '';
           if (row.isUnique) {
             badges += '<span class="badge bg-primary">Unique</span> ';
           }
           if (row.isLoginIdentifier) {
             badges += '<span class="badge bg-warning">Login Identifier</span>';
           }
           return badges;
         }
       },
       {
         data: null,
         title: "Order",
         orderable: false,
         searchable: false,
         render: function (data, type, row) {
           let b64FieldName = window.btoa(row.fieldName);
           let upButton = row._isFirst
             ? '<button type="button" class="btn btn-secondary btn-sm" disabled><i class="fas fa-arrow-up"></i></button>'
             : `<button type="button" class="btn btn-secondary btn-sm" onclick="moveFieldUp('${b64FieldName}')"><i class="fas fa-arrow-up"></i></button>`;
           let downButton = row._isLast
             ? '<button type="button" class="btn btn-secondary btn-sm" disabled><i class="fas fa-arrow-down"></i></button>'
             : `<button type="button" class="btn btn-secondary btn-sm" onclick="moveFieldDown('${b64FieldName}')"><i class="fas fa-arrow-down"></i></button>`;
           return `${upButton} ${downButton}`;
         }
       },
       {
         data: null,
         title: "Actions",
         orderable: false,
         searchable: false,
         render: function (data, type, row) {
           let b64FieldName = window.btoa(row.fieldName);
           return `<div style="text-align: right;">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditField" onclick="editAccoundField('${b64FieldName}')"><i class="fas fa-edit"></i></button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="javascript:deleteField('${b64FieldName}');"><i class="fas fa-trash"></i></button>
                    </div>`;
         }
       }
    ]
  });
</script>
