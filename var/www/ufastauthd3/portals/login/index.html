<!DOCTYPE html>
<html lang="en" class="h-100" data-bs-theme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Authentication Login Page</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" type="text/css">
    <script src="assets/js/jquery.min.js" type="text/javascript"></script>

    <link rel="stylesheet" href="assets/css/login.css" type="text/css">

    <!-- Include jsSHA library -->
    <script src="assets/js/sha.js"></script>

    <!-- Include IAM credentials local helpers -->
    <script src="local/js/credentials.js"></script>

    <!-- Required libraries for OTP QR code generation -->
    <script src="assets/js/otplib.global.js"></script>
    <script src="assets/js/qrcode.min.js"></script>

    <!-- Font Awesome by Dave Gandy - http://fontawesome.io - https://github.com/FortAwesome/Font-Awesome -->
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="assets/css/solid.min.css">

    <!-- Local Login functions (modular) -->
    <script src="assets/js/login-state.js" type="text/javascript"></script>
    <script src="assets/js/login-helpers.js" type="text/javascript"></script>
    <script src="assets/js/login-cookies.js" type="text/javascript"></script>
    <script src="assets/js/login-session.js" type="text/javascript"></script>
    <script src="assets/js/login-auth.js" type="text/javascript"></script>
    <script src="assets/js/login-change-password.js" type="text/javascript"></script>
    <script src="assets/js/login-change-otp.js" type="text/javascript"></script>
    <script src="assets/js/login-events.js" type="text/javascript"></script>

</head>

<!--<%jvar/softwareVersion:softwareVersion%>-->

<body class="d-flex flex-column h-100">
    <!-- Added an outer container with flex to vertically center -->
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-4 col-12 mobile-fullscreen-card">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="brand-wrapper">
                                <div class="d-flex justify-content-center">
                                    <img src="assets/images/logo.jpg" alt="logo" class="logo" width="300">
                                </div>
                                <p class="login-card-header-text" id="version"></p>
                                <div class="d-flex justify-content-center">
                                    <p id="appDescription" class="text-center"></p>
                                </div>
                                <div class="d-flex justify-content-center">
                                    <p id="schemeDescription" class="text-center" style="font-size: -2px;"></p>
                                </div>
                                <input type="hidden" id="currentSchemeId">
                                <p class="login-card-header-message" id="message">_</p>
                            </div>

                            <div id="screenContent">
                                <!-- Screen 1: Username Input -->
                                <form id="usernameForm">
                                    <div class="mb-2">
                                        <input type="text" class="form-control text-center" id="username"
                                            name="username" placeholder="" required>
                                    </div>

                                    <div class="text-center mt-3 mb-3">
                                        <div class="form-check form-switch d-flex justify-content-center">
                                            <input class="form-check-input" type="checkbox" id="keepAuthenticated"
                                                style="margin-top: 4px;">
                                            <label class="form-check-label text-muted" for="keepAuthenticated"
                                                style="font-size: 0.85rem;">
                                                &nbsp;&nbsp;Keep me signed in
                                            </label>
                                        </div>
                                    </div>



                                    <button type="submit" class="btn btn-dark w-100">Next</button>
                                </form>

                                <!-- Screen 2: Generic Input -->
                                <form id="genericPasswordForm" class="d-none">
                                    <div class="mb-2">
                                        <input type="password" class="form-control text-center" id="genericPassword"
                                            name="genericPassword" placeholder="" required>
                                    </div>
                                    <div class="text-center mt-2 mb-2">
                                        <div class="form-check form-switch d-flex justify-content-center">
                                            <input class="form-check-input" type="checkbox" id="keepAuthenticatedPassword"
                                                style="margin-top: 4px;" disabled>
                                            <label class="form-check-label text-muted" id="keepAuthenticatedPasswordLabel" for="keepAuthenticatedPassword"
                                                style="font-size: 0.85rem;">
                                                &nbsp;&nbsp;Keep me signed in
                                            </label>
                                        </div>
                                    </div>
                                    <hr>
                                    <div class="mb-2">
                                        <button type="submit" class="btn btn-dark w-100">Submit</button>
                                    </div>
                                    <div class="mb-2">
                                        <button class="btn btn-warning w-100" onclick="logout();">Restart</button>
                                    </div>
                                </form>

                                <!-- Screen 3: OTP Token Input -->
                                <form id="otpForm" class="d-none">
                                    <div class="mb-2">
                                        <input type="text" class="form-control text-center" id="otp" name="otp"
                                            placeholder="Enter your OTP" required maxlength="6" pattern="[0-9]{6}">
                                    </div>
                                    <div class="text-center mt-2 mb-2">
                                        <div class="form-check form-switch d-flex justify-content-center">
                                            <input class="form-check-input" type="checkbox" id="keepAuthenticatedOtp"
                                                style="margin-top: 4px;" disabled>
                                            <label class="form-check-label text-muted" id="keepAuthenticatedOtpLabel" for="keepAuthenticatedOtp"
                                                style="font-size: 0.85rem;">
                                                &nbsp;&nbsp;Keep me signed in
                                            </label>
                                        </div>
                                    </div>
                                    <hr>
                                    <div class="mb-2">
                                        <button type="submit" class="btn btn-dark w-100">Verify</button>
                                    </div>
                                    <div class="mb-2">
                                        <button class="btn btn-warning w-100" onclick="logout();">Restart</button>
                                    </div>
                                </form>

                                <!-- Screen 4: External Authorization Waiting -->
                                <div id="authWaiting" class="d-none text-center">
                                    <p>Please approve the login request on your external device.</p>
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </div>

                                <!-- Screen 5: Logout -->
                                <div id="logoutForm" class="d-none">
                                    <div class="mb-2">
                                        <button id="continueToAppBtn" class="btn btn-dark w-100" onclick="loadTokenAndRedirect();">Continue
                                            to the application</button>
                                    </div>
                                    <div class="mb-2">
                                        <button class="btn btn-warning w-100" onclick="logout();">Logout</button>
                                    </div>
                                    <div>
                                    </div>

                                    <div id="logoutform" style="display: none;">
                                        <button type="button" class="btn btn-danger w-100"
                                            onclick="ajaxLogout()">Logout</button>
                                    </div>
                                </div>

                                <!-- Screen 6: Change Password -->
                                <div id="changePasswordScreen" class="d-none">
                                    <div class="mb-2">
                                        <label for="changeNewPassword" class="form-label">
                                            <i class="fa-solid fa-plus"></i> New Password
                                        </label>
                                        <input type="password" class="form-control text-center" id="changeNewPassword"
                                            placeholder="Enter new password" autocomplete="new-password">
                                    </div>

                                    <!-- Password Strength Validation Checklist -->
                                    <div id="changePasswordStrengthChecklist" class="d-none mb-3">
                                        <div style="font-size: 0.8rem;" id="changePasswordStrengthItems">
                                        </div>
                                    </div>

                                    <div class="mb-2">
                                        <label for="changeConfirmPassword" class="form-label">
                                            <i class="fa-solid fa-check-double"></i> Confirm New Password
                                        </label>
                                        <input type="password" class="form-control text-center"
                                            id="changeConfirmPassword" placeholder="Confirm new password"
                                            autocomplete="new-password">
                                    </div>
                                    <hr>
                                    <div class="mb-2">
                                        <button type="button" id="changePasswordSubmitBtn" class="btn btn-success w-100" disabled>
                                            <i class="fa-solid fa-save"></i> Change Password
                                        </button>
                                    </div>
                                    <div class="mb-2 d-none" id="skipPasswordChangeBtnContainer">
                                        <button type="button" id="skipPasswordChangeBtn" class="btn btn-secondary w-100"
                                            onclick="skipPasswordChange()">
                                            Skip (required later)
                                        </button>
                                    </div>
                                    <div class="mb-2">
                                        <button type="button" id="changePasswordCancelBtn"
                                            class="btn btn-warning w-100">Cancel</button>
                                    </div>
                                </div>

                                <!-- Screen 7: Change OTP -->
                                <div id="changeOtpScreen" class="d-none">
                                    <div class="alert alert-info mb-3">
                                        <i class="fa-solid fa-circle-info"></i> Scan the QR code with your TOTP
                                        Authenticator app, then enter the 6-digit code below.
                                    </div>
                                    <div class="text-center mb-3">
                                        <canvas id="changeOtpQrCanvas" class="d-none"
                                            style="max-width: 200px;"></canvas>
                                        <div id="changeOtpSecretText"
                                            class="bg-light p-2 rounded text-break font-monospace d-none"
                                            style="font-size: 0.9rem;"></div>
                                    </div>
                                    <div class="mb-2">
                                        <label for="changeOtpVerificationCode" class="form-label">
                                            <i class="fa-solid fa-shield-halved"></i> New OTP Code
                                        </label>
                                        <input type="text" class="form-control text-center"
                                            id="changeOtpVerificationCode" placeholder="XXXXXX" maxlength="6"
                                            pattern="[0-9]{6}" autocomplete="off">
                                    </div>
                                    <hr>
                                    <div class="mb-2">
                                        <button type="button" id="changeOtpSubmitBtn" class="btn btn-dark w-100">
                                            <i class="fa-solid fa-check"></i> Verify & Change
                                        </button>
                                    </div>
                                    <div class="mb-2">
                                        <button type="button" id="changeOtpCancelBtn"
                                            class="btn btn-warning w-100">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>


                    <div class="row text-center justify-content-center d-none d-md-block" style="font-size: 10px">
                        <br>
                        Licenced under SSPLv1
                        <a href="https://github.com/unmanarc/libMantids30" style="font-size: 10px"
                            target="_blank">Powered by libMantids3</a>
                    </div>



                </div>
            </div>


            <script>
                $('#username').keypress(function (e) {
                    if (e.which === 13) { // Enter key
                        $('#password').focus();
                    }
                });
                $('#password').keypress(function (e) {
                    var key = e.which;
                    if (key == 13)  // the enter key code
                    {
                        ajaxLogin();
                    }
                });
            </script>
            <script src="assets/js/bootstrap.min.js" type="text/javascript"></script>
</body>

</html>
