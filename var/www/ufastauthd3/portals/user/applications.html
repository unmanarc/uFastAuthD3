<script>
  document.getElementById("apptitle").innerHTML = "My Account ► Applications";
  document.getElementById("menu-applications").style.color = "white";
</script>

<!-- Applications Grid -->
<div class="row mb-4" id="applicationsGrid">
  <!-- Cards will be injected here by loadApplications() -->
</div>

<!-- Loading placeholder -->
<div id="applicationsLoading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-2">Loading applications...</p>
</div>

<!-- No Applications placeholder (hidden by default) -->
<div id="applicationsEmpty" class="text-center py-5 d-none">
  <i class="fa-solid fa-folder-open display-1 text-muted"></i>
  <p class="mt-3 text-muted">No applications assigned to your account.</p>
</div>

<script>
  /**
   * Format a UNIX timestamp (seconds) to a localized date string
   */
  function formatTimestamp(ts) {
    if (!ts) return '-';
    return new Date(ts * 1000).toLocaleString();
  }

  /**
   * Build and render application cards (XSS-safe version)
   */
  function renderApplications(apps) {
    var grid = $('#applicationsGrid');
    grid.empty();

    if (!apps || apps.length === 0) {
      $('#applicationsEmpty').removeClass('d-none');
      return;
    }

    $.each(apps, function (index, app) {
      // Determine admin badge (static HTML, safe)
      var adminBadge = app.isAppAdmin
        ? '<span class="badge bg-success"><i class="fa-solid fa-shield-halved"></i> Admin</span>'
        : '<span class="badge bg-info"><i class="fa-solid fa-user"></i> User</span>';

      // 1. Build card HTML with temporary ID placeholders instead of direct interpolation
      var cardHtml =
        '<div class="col-lg-4 col-md-6 mb-3">' +
          '<div class="card h-100 shadow-sm">' +
            '<div class="card-body d-flex flex-column">' +
              '<div class="d-flex justify-content-between align-items-start mb-2">' +
                '<h5 class="card-title mb-0">' +
                  '<i class="fa-solid fa-window-maximize text-primary"></i> ' +
                  '<span id="app-name-' + index + '"></span>' +
                '</h5>' +
                adminBadge +
              '</div>' +
              
              '<div id="app-desc-' + index + '" class="card-text text-muted flex-grow-1"></div>' +
              
              '<div class="mt-3">' +
                '<div class="mb-2">' +
                  '<small class="text-muted"><i class="fa-solid fa-user-tag"></i> Roles:</small><br>' +
                  '<div id="app-roles-' + index + '" class="mt-1"></div>' +
                '</div>' +
                '<div class="mb-2">' +
                  '<small class="text-muted"><i class="fa-solid fa-list-check"></i> Scopes: </small>' +
                  '<span id="app-scopes-' + index + '"></span>' +
                '</div>' +
                '<div class="mb-2">' +
                  '<small class="text-muted"><i class="fa-solid fa-calendar"></i> Enrolled: </small>' +
                  '<span id="app-enrolled-' + index + '"></span>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="card-footer bg-white border-top">' +
              '<button type="button" class="btn btn-outline-primary btn-sm w-100" ' +
                'data-bs-toggle="modal" data-bs-target="#modalAppScopes" ' +
                'onclick="openAppScopesModal(' + index + ')">' +
                '<i class="fa-solid fa-magnifying-glass"></i> Examine App Scopes' +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div>';

      // 2. Append to DOM first
      grid.append(cardHtml);

      // 3. Safely populate text using .text() after insertion
      var $nameEl = $('#app-name-' + index);
      $nameEl.text(app.name);

      var desc = app.description || 'No description';
      var descTruncated = desc.length > 150 ? desc.substring(0, 150) + '...' : desc;
      var $descEl = $('#app-desc-' + index);
      $descEl.text(descTruncated);
      $descEl.prop('title', desc); // Safely sets the tooltip attribute

      var $rolesEl = $('#app-roles-' + index);
      if (app.roles && app.roles.length > 0) {
        app.roles.forEach(function(role) {
          var $badge = $('<span>', { class: 'badge bg-primary' }).text(role);
          $rolesEl.append($badge).append(' ');
        });
      } else {
        $rolesEl.append('<span class="text-muted">None</span>');
      }

      var scopesCount = app.allScopes ? app.allScopes.length : 0;
      var scopesSummary = scopesCount > 0
        ? scopesCount + ' scope' + (scopesCount > 1 ? 's' : '') + ' assigned'
        : 'No scopes';
      $('#app-scopes-' + index).text(scopesSummary);

      $('#app-enrolled-' + index).text(formatTimestamp(app.enrollmentDate));
    });
  }

  /**
   * Load Applications from API
   */
  function loadApplications() {
    $.ajax({
      url: '/api/v1/listAccountApplicationsFullInfo',
      type: 'GET',
      success: function (response) {
        $('#applicationsLoading').addClass('d-none');
        applicationsList = response || [];
        renderApplications(applicationsList);
      },
      error: function () {
        $('#applicationsLoading').addClass('d-none');
        commonFunctionError.apply(this, arguments);
      }
    });
  }

  $(document).ready(function () {
    loadApplications();
  });
</script>
