<!-- ============================================================ -->
<!-- Modal: Change Password (2-step)                              -->
<!-- ============================================================ -->
<div class="modal fade" id="modalChangePassword" tabindex="-1" aria-labelledby="modalChangePasswordLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalChangePasswordLabel">
          <i class="fa-solid fa-lock"></i> Change Password
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- STEP 1: Verify Current Password -->
      <div id="changePasswordStep1">
        <div class="modal-body">
          <input type="hidden" id="changeSlotId">
          <input type="hidden" id="changePasswordFunction">
          <p class="text-muted mb-3" id="changeSlotDescription"></p>
          <div class="mb-3">
            <label for="changeCurrentPassword" class="form-label">
              <i class="fa-solid fa-key"></i> Current Password
            </label>
            <input type="password" class="form-control" id="changeCurrentPassword" placeholder="Enter current password"
              required autocomplete="current-password">
          </div>
          <div id="changePasswordStep1Error" class="alert alert-danger d-none" role="alert"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="verifyCurrentPassword()">
            <i class="fa-solid fa-check"></i> Verify
          </button>
        </div>
      </div>

      <!-- STEP 2: Set New Password -->
      <div id="changePasswordStep2" class="d-none">
        <div class="modal-body">
          <div class="mb-3">
            <label for="changeNewPassword" class="form-label">
              <i class="fa-solid fa-plus"></i> New Password
            </label>
            <input type="password" class="form-control" id="changeNewPassword" placeholder="Enter new password" required
              autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label for="changeConfirmPassword" class="form-label">
              <i class="fa-solid fa-check-double"></i> Confirm New Password
            </label>
            <input type="password" class="form-control" id="changeConfirmPassword" placeholder="Confirm new password"
              required autocomplete="new-password">
          </div>
          <div id="changePasswordStep2Error" class="alert alert-danger d-none" role="alert"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="submitChangePassword()">
            <i class="fa-solid fa-save"></i> Change Password
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Modal: Change Password (2-step)
  // ============================================================

  function openChangePasswordModal(index) {
    var item = credentialsList[index];
    if (!item || !item.credential) return;

    // Reset to Step 1
    $('#changePasswordStep1').removeClass('d-none');
    $('#changePasswordStep2').addClass('d-none');
    $('#changeCurrentPassword').val('');
    $('#changeNewPassword').val('');
    $('#changeConfirmPassword').val('');
    $('#changePasswordStep1Error').addClass('d-none').text('');
    $('#changePasswordStep2Error').addClass('d-none').text('');

    $('#changeSlotId').val(item.slotId);

    var passwordFunction = 0;
    if (item.credential.slotDetails && item.credential.slotDetails.passwordFunction !== undefined) {
      passwordFunction = item.credential.slotDetails.passwordFunction;
    }
    $('#changePasswordFunction').val(passwordFunction);

    $('#changeSlotDescription').text('Change password for: ' +
      (item.credential.slotDetails ? item.credential.slotDetails.description : 'Credential'));

    $('#modalChangePassword').modal('show');

    // Add Enter key listener for Step 1
    $('#changeCurrentPassword').off('keydown').on('keydown', function (e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        verifyCurrentPassword();
      }
    });
  }

  function verifyCurrentPassword() {
    $('#changePasswordStep1Error').addClass('d-none').text('');

    var slotId = parseInt($('#changeSlotId').val());
    var currentPassword = $('#changeCurrentPassword').val();

    if (!currentPassword) {
      $('#changePasswordStep1Error').text('Current password is required.').removeClass('d-none');
      return;
    }

    var payload = {
      slotId: slotId,
      verification: currentPassword,
      details: {
        operation: 'changeCredential'
      }
    };

    // Show loading state
    var $verifyBtn = $('#changePasswordStep1 .btn-primary');
    $verifyBtn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin"></i> Verifying...');

    $.ajax({
      url: '/api/v1/createChallengeToken',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function (response) {
        // Challenge token created successfully (stored in cookie by server)
        // Move to Step 2
        $('#changePasswordStep1').addClass('d-none');
        $('#changePasswordStep2').removeClass('d-none');
        $('#changeNewPassword').focus();

        loadCredentials();

        // Add Enter key listener for Step 2
        $('#changeConfirmPassword').off('keydown').on('keydown', function (e) {
          if (e.key === 'Enter' || e.keyCode === 13) {
            e.preventDefault();
            submitChangePassword();
          }
        });
      },
      error: function (xhr) {

        var msg = 'Failed to verify current password.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#changePasswordStep1Error').text(msg).removeClass('d-none');
        loadCredentials();

        setTimeout(function () {
          $('#changePasswordStep1Error').addClass('d-none');
        }, 3000);


      },
      complete: function () {
        $verifyBtn.prop('disabled', false).html('<i class="fa-solid fa-check"></i> Verify');
      }
    });
  }

  function submitChangePassword() {
    $('#changePasswordStep2Error').addClass('d-none').text('');

    var slotId = parseInt($('#changeSlotId').val());
    var passwordFunction = parseInt($('#changePasswordFunction').val());
    var newPassword = $('#changeNewPassword').val();
    var confirmPassword = $('#changeConfirmPassword').val();

    // Validations
    if (!newPassword) {
      $('#changePasswordStep2Error').text('New password is required.').removeClass('d-none');
      return;
    }
    if (newPassword !== confirmPassword) {
      $('#changePasswordStep2Error').text('Passwords do not match.').removeClass('d-none');
      return;
    }

    // Compute hash using the shared function from activatepwd modal
    var hashResult = computePasswordHash(newPassword, passwordFunction, null);

    var payload = {
      credential: {
        hash: hashResult.hash,
        ssalt: hashResult.ssalt,
        mustChange: false,
        slotDetails: {
          passwordFunction: passwordFunction
        }
      }
    };

    // Show loading state
    var $changeBtn = $('#changePasswordStep2 .btn-success');
    $changeBtn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin"></i> Changing...');

    $.ajax({
      url: '/api/v1/changeCredential',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function (response) {
        $('#modalChangePassword').modal('hide');
        showToastSuccess('Password changed successfully.');
        loadCredentials();
      },
      error: function (xhr) {
        var msg = 'Failed to change password.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#changePasswordStep2Error').text(msg).removeClass('d-none');
      },
      complete: function () {
        $changeBtn.prop('disabled', false).html('<i class="fa-solid fa-save"></i> Change Password');
      }
    });
  }
</script>
