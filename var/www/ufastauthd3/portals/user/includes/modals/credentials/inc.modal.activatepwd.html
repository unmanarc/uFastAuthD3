<!-- ============================================================ -->
<!-- Modal: Activate Empty Credential (Password)                  -->
<!-- ============================================================ -->
<div class="modal fade" id="modalActivatePassword" tabindex="-1" aria-labelledby="modalActivatePasswordLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalActivatePasswordLabel">
          <i class="fa-solid fa-toggle-on"></i> Activate Credential
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="activateSlotId">
        <input type="hidden" id="activateSsalt">
        <input type="hidden" id="activatePasswordFunction">
        <p class="text-muted mb-3" id="activateSlotDescription"></p>

        <div class="mb-3">
          <label for="activateNewPassword" class="form-label"><i class="fa-solid fa-plus"></i> Set Password</label>
          <input type="password" class="form-control" id="activateNewPassword" placeholder="Enter password" required
            autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label for="activateConfirmPassword" class="form-label"><i class="fa-solid fa-check-double"></i> Confirm
            Password</label>
          <input type="password" class="form-control" id="activateConfirmPassword" placeholder="Confirm password"
            required autocomplete="new-password">
        </div>
        <div id="activateError" class="alert alert-danger d-none" role="alert"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn bfsuccess btn-primary" onclick="submitActivatePassword()">
          <i class="fa-solid fa-save"></i> Activate
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Modal: Activate Empty Credential (Password)
  // ============================================================

  function openActivatePasswordModal(index) {
    var item = credentialsList[index];
    if (!item || !item.credential) return;

    resetModalAlerts('activateError');
    $('#activateNewPassword').val('');
    $('#activateConfirmPassword').val('');

    $('#activateSlotId').val(item.slotId);

    // INICIALIZACIÓN: No leemos ni pre-cargamos la sal existente. 
    // Se forzará a generar una nueva en submitActivatePassword.
    $('#activateSsalt').val('');

    var passwordFunction = 0;
    if (item.credential.slotDetails && item.credential.slotDetails.passwordFunction !== undefined) {
      passwordFunction = item.credential.slotDetails.passwordFunction;
    }
    $('#activatePasswordFunction').val(passwordFunction);

    $('#activateSlotDescription').text('Activate credential: ' + (item.credential.slotDetails ? item.credential.slotDetails.description : 'Credential'));

    $('#modalActivatePassword').modal('show');

    // Add Enter key listener to trigger Activate
    $('#activateConfirmPassword').off('keydown').on('keydown', function (e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        submitActivatePassword();
      }
    });
  }

  function submitActivatePassword() {
    resetModalAlerts('activateError');

    var slotId = parseInt($('#activateSlotId').val());
    var passwordFunction = parseInt($('#activatePasswordFunction').val());
    var newPassword = $('#activateNewPassword').val();
    var confirmPassword = $('#activateConfirmPassword').val();

    // Validaciones básicas
    if (!newPassword) {
      $('#activateError').text('Password is required.').removeClass('d-none');
      return;
    }
    if (newPassword !== confirmPassword) {
      $('#activateError').text('Passwords do not match.').removeClass('d-none');
      return;
    }

    // FORZAMOS INICIALIZACIÓN DE SAL: Siempre pasamos null para que computePasswordHash 
    // genere una nueva sal aleatoria (nunca reutiliza la antigua).
    var hashResult = computePasswordHash(newPassword, passwordFunction, null);

    var payload = {
      slotId: slotId,
      hash: hashResult.hash,
      ssalt: hashResult.ssalt
    };

    console.log('Initializing credential with new salt:', payload);

    $.ajax({
      url: '/api/v1/activateCredential',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function (response) {
        $('#modalActivatePassword').modal('hide');
        showTextToastSuccess('Credential activated successfully.');
        loadCredentials();
      },
      error: function (xhr) {
        var msg = 'Failed to activate credential.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#activateError').text(msg).removeClass('d-none');
        setTimeout(function () {
          $('#activateError').addClass('d-none');
        }, 3000);
      }
    });
  }
</script>
