<!-- ============================================================ -->
<!-- Modal: Delete Credential                                     -->
<!-- ============================================================ -->
<div class="modal fade" id="modalDeleteCredential" tabindex="-1" aria-labelledby="modalDeleteCredentialLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="modalDeleteCredentialLabel">
          <i class="fa-solid fa-trash"></i> Deactivate Credential
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="deleteSlotId">
        <p class="mb-0">Are you sure you want to remove this credential? This action cannot be undone.</p>

        <!-- Verification field (dynamic: password or OTP) -->
        <div id="deleteVerificationSection" class="mb-3 mt-3">
          <label for="deleteVerificationValue" class="form-label">
            <i class="fa-solid fa-shield-halved"></i> <span id="deleteVerificationLabel"></span>
          </label>
          <input type="text" class="form-control" id="deleteVerificationValue" placeholder="" required>
        </div>

        <div id="deleteError" class="alert alert-danger d-none" role="alert"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="submitDeleteCredential()">
          <i class="fa-solid fa-trash"></i> Deactivate
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Modal: Delete Credential
  // ============================================================

  /**
   * Open the Delete Credential confirmation modal
   */
  function openDeleteCredentialModal(index) {
    var item = credentialsList[index];
    if (!item || !item.credential) return;

    resetModalAlerts('deleteError');
    $('#deleteSlotId').val(item.slotId);
    $('#deleteVerificationValue').val('');

    var passwordFunction = item.credential.slotDetails ? item.credential.slotDetails.passwordFunction : HashFunction.FN_NOTFOUND;

    // Configure verification field based on credential type
    if (isFunctionOTP(passwordFunction)) {
      $('#deleteVerificationLabel').text('Enter TOTP Code');
      $('#deleteVerificationValue').attr('type', 'text').attr('placeholder', 'XXXXXX').attr('maxlength', '6').attr('pattern', '[0-9]{6}').attr('autocomplete', 'off').addClass('text-center');
    } else {
      $('#deleteVerificationLabel').text('Enter Current Password');
      $('#deleteVerificationValue').attr('type', 'password').attr('placeholder', 'Enter current password').attr('autocomplete', 'off').removeAttr('maxlength').removeAttr('pattern').removeClass('text-center');
    }

    // Add Enter key listener
    $('#deleteVerificationValue').off('keydown').on('keydown', function (e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        submitDeleteCredential();
      }
    });


    $('#modalDeleteCredential').modal('show');
  }

  /**
   * Submit the Delete Credential confirmation
   */
  function submitDeleteCredential() {
    resetModalAlerts('deleteError');

    var slotId = parseInt($('#deleteSlotId').val());
    var verificationValue = $('#deleteVerificationValue').val().trim();

    // Validation
    if (!verificationValue) {
      $('#deleteError').text('Verification is required to delete this credential.').removeClass('d-none');
      setTimeout(function () {
        $('#deleteError').addClass('d-none');
      }, 3000);
      return;
    }

    $.ajax({
      url: '/api/v1/deleteCredential',
      type: 'DELETE',
      contentType: 'application/json',
      data: JSON.stringify({ slotId: slotId, verification: verificationValue }),
      success: function (response) {
        $('#modalDeleteCredential').modal('hide');
        showToastSuccess('Credential deleted successfully.');
        loadCredentials();
      },
      error: function (xhr) {
        loadCredentials();

        var msg = 'Failed to delete credential.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#deleteError').text(msg).removeClass('d-none');
        setTimeout(function () {
          $('#deleteError').addClass('d-none');
        }, 3000);
      }
    });
  }
</script>
