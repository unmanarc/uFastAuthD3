<!-- ============================================================ -->
<!-- Modal: Activate Empty Credential (OTP)                       -->
<!-- ============================================================ -->

<!-- Include required libraries -->
<script src="/assets/js/otplib.global.js"></script>
<script src="/assets/js/qrcode.min.js"></script>

<div class="modal fade" id="modalActivateOTP" tabindex="-1" aria-labelledby="modalActivateOTPLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalActivateOTPLabel">
          <i class="fa-solid fa-clock"></i> Activate TOTP Authenticator
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="activateOtpSlotId">
        
        <div class="alert alert-info">
          <i class="fa-solid fa-circle-info"></i> Scan the QR code with your TOTP Authenticator app, then enter the 6-digit code below.
        </div>
        <div class="text-center mb-3">
          <canvas id="activateOtpQrCanvas" class="d-none" style="max-width: 200px;"></canvas>
          <div id="activateOtpSecretText" class="bg-light p-2 rounded text-break font-monospace d-none" style="font-size: 0.9rem;"></div>
        </div>
        <div class="mb-3">
          <label for="activateOtpVerificationCode" class="form-label"><i class="fa-solid fa-shield-halved"></i> OTP Code</label>
          <input type="text" class="form-control text-center" id="activateOtpVerificationCode" placeholder="XXXXXX" maxlength="6" pattern="[0-9]{6}" autocomplete="off">
        </div>

        <div id="activateOtpError" class="alert alert-danger d-none" role="alert"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="submitActivateOTPActivation()">
          <i class="fa-solid fa-check"></i> Verify & Activate
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Modal: Activate Empty Credential (OTP)
  // ============================================================

  // Store the generated secret for validation
  var activateOtpGeneratedSecret = '';

  /**
   * Open the Activate OTP modal
   */
  function openActivateOTPModal(index) {
    var item = credentialsList[index];
    if (!item || !item.credential) return;

    resetModalAlerts('activateOtpError');
    $('#activateOtpVerificationCode').val('');
    $('#activateOtpQrCanvas').addClass('d-none');
    $('#activateOtpSecretText').addClass('d-none');

    $('#activateOtpSlotId').val(item.slotId);

    $('#modalActivateOTP').modal('show');

    // Add Enter key listener to trigger Verify & Activate
    $('#activateOtpVerificationCode').off('keydown').on('keydown', function(e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        submitActivateOTPActivation();
      }
    });

    // Generate OTP secret client-side using otplib v13
    var secret = otplib.generateSecret();
    activateOtpGeneratedSecret = secret;

    // Build the OTPAUTH URI using otplib v13 generateURI
    /*
    var label = item.credential.slotDetails ? item.credential.slotDetails.description : 'Credential';
    var uri = otplib.generateURI({
      secret: secret,
      issuer: 'UFastAuthD3',
      label: label
    });*/

       // Build the OTPAUTH URI using otplib v13 generateURI
      var slotDescription = item.credential.slotDetails ? item.credential.slotDetails.description : 'Credential';
      var label = user + ' - ' + slotDescription;
      var issuer = window.location.hostname;
      var uri = otplib.generateURI({
        secret: secret,
        issuer: issuer,
        label: label
      });



    // Generate QR code on canvas using qrcode library
    var canvas = document.getElementById('activateOtpQrCanvas');
    QRCode.toCanvas(canvas, uri, { width: 200 }, function (error) {
      if (error) {
        console.error('QR Code generation failed:', error);
        $('#activateOtpError').text('Failed to generate QR code.').removeClass('d-none');
      } else {
        $('#activateOtpQrCanvas').removeClass('d-none');
      }
    });

    // Display the raw secret as fallback
    //$('#activateOtpSecretText').text('Secret: ' + secret).removeClass('d-none');
  }

  /**
   * Submit the Activate OTP form
   */
  function submitActivateOTPActivation() {
    resetModalAlerts('activateOtpError');

    var slotId = parseInt($('#activateOtpSlotId').val());
    var verificationCode = $('#activateOtpVerificationCode').val().trim();

    if (!verificationCode || verificationCode.length !== 6) {
      $('#activateOtpError').text('Please enter a valid 6-digit OTP code.').removeClass('d-none');
      return;
    }

    // Client-side validation using otplib v13 verifySync (synchronous TOTP verification)
    var result = otplib.verifySync({
      token: verificationCode,
      secret: activateOtpGeneratedSecret
    });

    if (!result || !result.valid) {
      $('#activateOtpError').text('Invalid OTP code. Please scan the QR code again and try.').removeClass('d-none');
      return;
    }

    var payload = {
      slotId: slotId,
      seed: activateOtpGeneratedSecret
    };

    $.ajax({
      url: '/api/v1/activateOTPCredential',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function(response) {
        $('#modalActivateOTP').modal('hide');
        showToastSuccess('TOTP Authenticator activated successfully.');
        loadCredentials();
      },
      error: function(xhr) {
        var msg = 'Failed to activate OTP.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#activateOtpError').text(msg).removeClass('d-none');
        setTimeout(function() {
          $('#activateOtpError').addClass('d-none');
        }, 3000);
      }
    });
  }
</script>
