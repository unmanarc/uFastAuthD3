<!-- ============================================================ -->
<!-- Modal: Change OTP (2-step)                                   -->
<!-- ============================================================ -->

<!-- Include required libraries -->
<script src="assets/js/otplib.global.js"></script>
<script src="assets/js/qrcode.min.js"></script>

<div class="modal fade" id="modalChangeOTP" tabindex="-1" aria-labelledby="modalChangeOTPLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalChangeOTPLabel">
          <i class="fa-solid fa-rotate"></i> Change OTP Credential
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="changeOtpSlotId">
        <input type="hidden" id="changeOtpFunction">


        <!-- =============================== -->
        <!-- STEP 1: Verify current OTP      -->
        <!-- =============================== -->
        <div id="changeOtpStep1">
          <div class="alert alert-info">
            <i class="fa-solid fa-circle-info"></i> Enter your current TOTP code to verify your identity before changing
            the credential.
          </div>
          <div class="mb-3">
            <label for="changeOtpCurrentVerification" class="form-label">
              <i class="fa-solid fa-shield-halved"></i> Current TOTP Code
            </label>
            <input type="text" class="form-control text-center" id="changeOtpCurrentVerification" placeholder="XXXXXX"
              maxlength="6" pattern="[0-9]{6}" autocomplete="off">
          </div>
          <div id="changeOtpStep1Error" class="alert alert-danger d-none" role="alert"></div>
        </div>

        <!-- =============================== -->
        <!-- STEP 2: Setup new OTP           -->
        <!-- =============================== -->
        <div id="changeOtpStep2" class="d-none">
          <div class="alert alert-info">
            <i class="fa-solid fa-circle-info"></i> Identity verified! Scan the QR code with your TOTP Authenticator
            app, then enter the 6-digit code below.
          </div>
          <div class="text-center mb-3">
            <canvas id="changeOtpQrCanvas" class="d-none" style="max-width: 200px;"></canvas>
            <div id="changeOtpSecretText" class="bg-light p-2 rounded text-break font-monospace d-none"
              style="font-size: 0.9rem;"></div>
          </div>
          <div class="mb-3">
            <label for="changeOtpVerificationCode" class="form-label">
              <i class="fa-solid fa-shield-halved"></i> New OTP Code
            </label>
            <input type="text" class="form-control text-center" id="changeOtpVerificationCode" placeholder="XXXXXX"
              maxlength="6" pattern="[0-9]{6}" autocomplete="off">
          </div>
          <div id="changeOtpStep2Error" class="alert alert-danger d-none" role="alert"></div>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary " id="changeOtpSubmitBtn" onclick="submitChangeOtpStep1()">
          <i class="fa-solid fa-shield-halved"></i> Verify
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Modal: Change OTP (2-step process)
  // ============================================================

  var changeOtpSlotId = 0;
  var changeOtpCurrentStep = 1;
  var changeOtpGeneratedSecret = '';

  /**
   * Open the Change OTP modal (Step 1)
   */
  function openChangeOTPModal(index) {
    var item = credentialsList[index];
    if (!item || !item.credential) return;

    // Reset to Step 1
    changeOtpCurrentStep = 1;
    changeOtpGeneratedSecret = '';
    $('#changeOtpSlotId').val(item.slotId);
    changeOtpSlotId = item.slotId;

    // Reset fields
    $('#changeOtpCurrentVerification').val('');
    $('#changeOtpVerificationCode').val('');
    $('#changeOtpQrCanvas').addClass('d-none');
    $('#changeOtpSecretText').addClass('d-none');

    var passwordFunction = 0;
    if (item.credential.slotDetails && item.credential.slotDetails.passwordFunction !== undefined) {
      passwordFunction = item.credential.slotDetails.passwordFunction;
    }
    $('#changeOtpFunction').val(passwordFunction);


    // Reset alerts
    resetModalAlerts('changeOtpStep1Error');
    resetModalAlerts('changeOtpStep2Error');

    // Show Step 1, hide Step 2
    $('#changeOtpStep1').removeClass('d-none');
    $('#changeOtpStep2').addClass('d-none');

    // Configure button for Step 1
    $('#changeOtpSubmitBtn').html('<i class="fa-solid fa-shield-halved"></i> Verify')
      .removeClass('btn-success').addClass('btn-primary')
      .off('click').on('click', submitChangeOtpStep1);

    // Add Enter key listener for Step 1
    $('#changeOtpCurrentVerification').off('keydown').on('keydown', function (e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        submitChangeOtpStep1();
      }
    });

    $('#modalChangeOTP').modal('show');
  }

  /**
   * Step 1: Verify current OTP and get challenge token
   */
  function submitChangeOtpStep1() {
    resetModalAlerts('changeOtpStep1Error');

    var verificationValue = $('#changeOtpCurrentVerification').val().trim();

    if (!verificationValue || verificationValue.length !== 6) {
      $('#changeOtpStep1Error').text('Please enter a valid 6-digit TOTP code.').removeClass('d-none');
      return;
    }

    var payload = {
      slotId: changeOtpSlotId,
      verification: verificationValue,
      details: {
        operation: 'changeCredential'
      }
    };

    $.ajax({
      url: '/api/v1/createChallengeToken',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function (response) {
        // Challenge token created successfully (stored in cookie)
        // Proceed to Step 2
        goToChangeOtpStep2();
        loadCredentials();

      },
      error: function (xhr) {
        var msg = 'Failed to verify current OTP.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#changeOtpStep1Error').text(msg).removeClass('d-none');
        setTimeout(function () {
          $('#changeOtpStep1Error').addClass('d-none');
        }, 5000);
        loadCredentials();

      }
    });
  }

  /**
   * Navigate to Step 2: Generate new OTP secret and QR code
   */
  function goToChangeOtpStep2() {
    changeOtpCurrentStep = 2;

    // Hide Step 1, show Step 2
    $('#changeOtpStep1').addClass('d-none');
    $('#changeOtpStep2').removeClass('d-none');

    // Configure button for Step 2
    $('#changeOtpSubmitBtn').html('<i class="fa-solid fa-check"></i> Verify & Change')
      .removeClass('btn-primary').addClass('btn-success')
      .off('click').on('click', submitChangeOtpStep2);

    // Add Enter key listener for Step 2
    $('#changeOtpVerificationCode').off('keydown').on('keydown', function (e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        submitChangeOtpStep2();
      }
    });

    // Find credential description for the QR label
    var item = null;
    $.each(credentialsList, function (idx, credItem) {
      if (credItem.slotId === changeOtpSlotId) {
        item = credItem;
        return false;
      }
    });

    var slotDescription = item && item.credential && item.credential.slotDetails
      ? item.credential.slotDetails.description : 'Credential';
    var label = ufad3_accountPublicData.body.displayName + ' - ' + slotDescription;
    var issuer = window.location.hostname;

    // Generate OTP secret client-side using otplib v13
    var secret = otplib.generateSecret();
    changeOtpGeneratedSecret = secret;

    // Build the OTPAUTH URI
    var uri = otplib.generateURI({
      secret: secret,
      issuer: issuer,
      label: label
    });

    // Generate QR code on canvas
    var canvas = document.getElementById('changeOtpQrCanvas');
    QRCode.toCanvas(canvas, uri, { width: 200 }, function (error) {
      if (error) {
        console.error('QR Code generation failed:', error);
        $('#changeOtpStep2Error').text('Failed to generate QR code.').removeClass('d-none');
      } else {
        $('#changeOtpQrCanvas').removeClass('d-none');
      }
    });
  }

  /**
   * Step 2: Validate new OTP and submit change
   */
  function submitChangeOtpStep2() {
    resetModalAlerts('changeOtpStep2Error');

    var verificationCode = $('#changeOtpVerificationCode').val().trim();

    if (!verificationCode || verificationCode.length !== 6) {
      $('#changeOtpStep2Error').text('Please enter a valid 6-digit OTP code.').removeClass('d-none');
      return;
    }

    // Client-side validation using otplib v13 verifySync
    var result = otplib.verifySync({
      token: verificationCode,
      secret: changeOtpGeneratedSecret
    });

    if (!result || !result.valid) {
      $('#changeOtpStep2Error').text('Invalid OTP code. Please scan the QR code again and try.').removeClass('d-none');
      return;
    }

    var passwordFunction = parseInt($('#changeOtpFunction').val());

    var payload = {
      credential: {
        hash: changeOtpGeneratedSecret,
        ssalt: "",
        mustChange: false,
        slotDetails: {
          passwordFunction: passwordFunction
        }
      }
    };



    $.ajax({
      url: '/api/v1/changeCredential',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(payload),
      success: function (response) {
        $('#modalChangeOTP').modal('hide');
        showTextToastSuccess('OTP credential changed successfully.');
        loadCredentials();
      },
      error: function (xhr) {
        var msg = 'Failed to change OTP credential.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          msg = xhr.responseJSON.message;
        }
        $('#changeOtpStep2Error').text(msg).removeClass('d-none');
        setTimeout(function () {
          $('#changeOtpStep2Error').addClass('d-none');
        }, 5000);
      }
    });
  }
</script>
