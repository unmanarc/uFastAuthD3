<script>
  document.getElementById("apptitle").innerHTML = "My Account ► Credentials";
  document.getElementById("menu-credentials").style.color = "white";
</script>

<!-- Credentials Grid -->
<div class="row mb-4" id="credentialsGrid">
  <!-- Cards will be injected here by loadCredentials() -->
</div>

<!-- Loading placeholder -->
<div id="credentialsLoading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-2">Loading credentials...</p>
</div>

<!-- No Credentials placeholder (hidden by default) -->
<div id="credentialsEmpty" class="text-center py-5 d-none">
  <i class="fa-solid fa-key display-1 text-muted"></i>
  <p class="mt-3 text-muted">No credentials available.</p>
</div>

<script>
  // ============================================================
  // Global variables
  // ============================================================
  var credentialsList = [];

  // ============================================================
  // HashFunction enum (matches backend)
  // ============================================================
  var HashFunction = {
    FN_NOTFOUND: 500,
    FN_PLAIN: 0,
    FN_SHA256: 1,
    FN_SHA512: 2,
    FN_SSHA256: 3,
    FN_SSHA512: 4,
    FN_GAUTHTIME: 5
  };

  // ============================================================
  // Helper Functions
  // ============================================================

  /**
   * Check if the function is a password-type function (0-4)
   */
  function isFunctionPassword(fn) {
    return fn >= 0 && fn <= 4;
  }

  /**
   * Check if the function is a TOTP/OTP function (5)
   */
  function isFunctionOTP(fn) {
    return fn === 5;
  }

  /**
   * Get FontAwesome icon for the credential type
   */
  function getCredentialIcon(fn) {
    if (isFunctionOTP(fn)) {
      return '<i class="fa-solid fa-clock text-success"></i>';
    }
    return '<i class="fa-solid fa-lock text-primary"></i>';
  }

  /**
   * Get human-readable name for the hash function
   */
  function formatFunctionName(fn) {
    switch (fn) {
      case 0: return 'Plain Text';
      case 1: return 'SHA-256';
      case 2: return 'SHA-512';
      case 3: return 'SSHA-256';
      case 4: return 'SSHA-512';
      case 5: return 'Time-based OTP Token (TOTP)';
      default: return 'Unknown';
    }
  }

  /**
   * Format a UNIX timestamp (seconds) to a localized date string
   */
  function formatTimestamp(ts) {
    if (!ts || ts === 0 || ts === 1) return '-';
    return new Date(ts * 1000).toLocaleString();
  }

  /**
   * Reset modal alerts and fields
   */
  function resetModalAlerts(errorId, successId) {
    $('#' + errorId).addClass('d-none').text('');
    $('#' + successId).addClass('d-none').text('');
  }
</script>

<script>


  // ============================================================
  // Render Credentials
  // ============================================================
  function renderCredentials(list) {
    var grid = $('#credentialsGrid');
    grid.empty();

    if (!list || list.length === 0) {
      $('#credentialsEmpty').removeClass('d-none');
      return;
    }

    $.each(list, function (index, item) {
      var slotId = item.slotId;
      var isActive = item.isActive;
      var cred = item.credential;
      var slotDetails = cred ? cred.slotDetails : null;
      var passwordFunction = slotDetails ? slotDetails.passwordFunction : HashFunction.FN_NOTFOUND;
      var description = slotDetails ? slotDetails.description : 'Unknown';

      // Determine card styling
      var cardClass = 'card h-100 shadow-sm';
      var bodyPrefix = '';

      // Status badges
      var activeBadge = isActive
        ? '' // <span class="badge bg-success"><i class="fa-solid fa-check"></i> Active</span>
        : '<span class="badge bg-secondary"><i class="fa-solid fa-times"></i> Inactive</span>';

      var expiredBadge = (cred && cred.isExpired)
        ? '<span class="badge bg-warning text-dark"><i class="fa-solid fa-clock"></i> Expired</span>'
        : '<span class="badge bg-info"><i class="fa-solid fa-clock"></i> Valid</span>';

      var lockedBadge = (cred && cred.hasExceededMaxAttempts)
        ? '<span class="badge bg-danger"><i class="fa-solid fa-lock"></i> Locked</span>'
        : '<span class="badge bg-light text-dark border"><i class="fa-solid fa-unlock"></i> Unlocked</span>';

      // Function badge
      var functionBadge = '<span class="badge bg-dark">' + formatFunctionName(passwordFunction) + '</span>';

      // Delete button: only for active credentials and not slot 1
      // Placed in header, icon-only, small size
      var deleteBtnHtml = '';
      if (isActive && slotId !== 1 && !(cred && cred.hasExceededMaxAttempts)) {
        deleteBtnHtml = '<button type="button" class="btn btn-outline-danger btn-sm ms-2 p-1" onclick="openDeleteCredentialModal(' + index + ')" title="Delete Credential">' +
          '<i class="fa-solid fa-trash"></i>' +
          '</button>';
      }

      // Build actions buttons (footer)
      var actionsHtml = '';

      // Details section
      var detailsHtml = '';
      if (cred) {
        detailsHtml += '<div class="mb-1"><small class="text-muted"><i class="fa-solid fa-calendar"></i> Expires: </small><span id="cred-expire-' + index + '"></span></div>';
        detailsHtml += '<div class="mb-1"><small class="text-muted"><i class="fa-solid fa-calendar"></i> Last Change: </small><span id="cred-lastchange-' + index + '"></span></div>';
        detailsHtml += '<div class="mb-1"><small class="text-muted"><i class="fa-solid fa-eye"></i> Bad Attempts: </small><span id="cred-bad-' + index + '"></span></div>';
      }

      if (!isActive) {
        expiredBadge = "";
        lockedBadge = "";
        detailsHtml = "";
        // Inactive credential: show Activate button
        if (isFunctionOTP(passwordFunction)) {
          actionsHtml += '<button type="button" class="btn btn-dark btn-sm w-100 mb-2" onclick="openActivateOTPModal(' + index + ')">' +
            '<i class="fa-solid fa-toggle-on"></i> Activate TOTP Authenticator' +
            '</button>';
        } else {
          actionsHtml += '<button type="button" class="btn btn-dark btn-sm w-100 mb-2" onclick="openActivatePasswordModal(' + index + ')">' +
            '<i class="fa-solid fa-toggle-on"></i> Activate Credential' +
            '</button>';
        }
      }
      else {
        if (!(cred && cred.hasExceededMaxAttempts)) {
          // Has credential: show Change button
          if (isFunctionOTP(passwordFunction)) {
            actionsHtml += '<button type="button" class="btn btn-success btn-sm w-100 mb-2" onclick="openChangeOTPModal(' + index + ')">' +
              '<i class="fa-solid fa-clock"></i> Change OTP' +
              '</button>';
          } else {
            actionsHtml += '<button type="button" class="btn btn-primary btn-sm w-100 mb-2" onclick="openChangePasswordModal(' + index + ')">' +
              '<i class="fa-solid fa-lock"></i> Change Password' +
              '</button>';
          }
          // Delete button removed from footer, now rendered in header
        }
      }
      var color = '';

      if (!isActive)
        color = 'bg-light';
      else if (cred && cred.hasExceededMaxAttempts)
        color = 'bg-danger-subtle';
      else if (cred && cred.isExpired)
        color = 'bg-warning-subtle';

      // Build card HTML
      var cardHtml =
        '<div class="col-lg-4 col-md-6 mb-3">' +
        '<div class="' + cardClass + '" id="cred-card-' + index + '">' +
        '<div class="card-header d-flex justify-content-between align-items-center" ' + (!isActive ? 'style="background-color: #e9ecef;"' : '') + '>' +
        '<h6 class="mb-0">' + getCredentialIcon(passwordFunction) + ' <span id="cred-desc-' + index + '"></span></h6>' +
        '<div class="d-flex align-items-center">' + activeBadge + deleteBtnHtml + '</div>' +
        '</div>' +
        '<div class="card-body ' + (color) + '">' +
        '<div class="d-flex flex-wrap gap-1 mb-2">' +
        expiredBadge + ' ' + lockedBadge + ' ' + functionBadge +
        '</div>' +
        '<div class="mb-3">' + detailsHtml + '</div>' +
        '</div>' +
        '<div class="card-footer bg-white">' +
        actionsHtml +
        '</div>' +
        '</div>' +
        '</div>';

      grid.append(cardHtml);

      // Safe text injection
      $('#cred-desc-' + index).text(description);
      if (cred) {
        $('#cred-expire-' + index).text(formatTimestamp(cred.expirationTimestamp));
        $('#cred-lastchange-' + index).text(formatTimestamp(cred.lastChange));
        $('#cred-bad-' + index).text(cred.badAttempts || 0);
      }
    });
  }

  // ============================================================
  // Load Credentials
  // ============================================================

  /**
   * Load credentials from API
   */
  function loadCredentials() {
    $.ajax({
      url: '/api/v1/listAllAuthCredentialSlotsPublicData',
      type: 'GET',
      success: function (response) {
        $('#credentialsLoading').addClass('d-none');
        credentialsList = response || [];
        renderCredentials(credentialsList);
      },
      error: commonFunctionError
    });
  }

  // ============================================================
  // Bootstrap modal event listeners for cleanup
  // ============================================================
  $(document).ready(function () {
    $('#modalChangePassword').on('hidden.bs.modal', function () {
      resetModalAlerts('changePasswordError', 'changePasswordSuccess');
    });
    $('#modalChangeOTP').on('hidden.bs.modal', function () {
      resetModalAlerts('changeOtpStep1Error');
      resetModalAlerts('changeOtpStep2Error');
      $('#changeOtpCurrentVerification').val('');
      $('#changeOtpVerificationCode').val('');
    });
    $('#modalActivatePassword').on('hidden.bs.modal', function () {
      resetModalAlerts('activateError', 'activateSuccess');
    });
    $('#modalActivateOTP').on('hidden.bs.modal', function () {
      resetModalAlerts('activateOtpError', 'activateOtpSuccess');
    });
    $('#modalDeleteCredential').on('hidden.bs.modal', function () {
      resetModalAlerts('deleteError', '');
      $('#deleteVerificationValue').val('');
    });

    loadCredentials();
  });
</script>
